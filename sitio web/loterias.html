<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LOTTERY SYSTEMS - Pago de Loterías</title>
<script src="seguridad.js"></script>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
.topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px 20px; position:relative; }
.logo-section { display:flex; align-items:center; }
.logo-section img { height:40px; margin-right:10px; }
.logo-section span { font-size:20px; font-weight:bold; }
.hamburger { font-size:26px; cursor:pointer; user-select:none; }
.menu-dropdown { position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2); display:none; flex-direction:column; min-width:200px; z-index:999; }
.menu-dropdown button { padding:12px; border:none; background:white; text-align:left; cursor:pointer; font-weight:bold; border-bottom:1px solid #eee; }
.menu-dropdown button:hover { background:#f2f2f2; }
.user-info { width:100%; background:#e0d4ff; display:flex; justify-content:flex-end; padding:5px 20px; font-size:14px; color:#333; }
.titulo-bar { width:95%; margin:20px auto; padding:10px; background:#512BD4; color:white; font-size:20px; font-weight:bold; border-radius:5px; text-align:center; }

/* 🔥 FORM EN UNA SOLA FILA */
.form-container {
  width:95%; 
  max-width:1200px; 
  margin:20px auto; 
  background:white; 
  padding:15px; 
  border-radius:8px; 
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  
  display:flex; 
  align-items:center; 
  gap:10px;
  flex-wrap:nowrap; /* 🔥 evita que bajen */
  overflow-x:auto;  /* 🔥 por si no cabe */
}

.form-container select, 
.form-container input { 
  padding:8px; 
  font-size:14px; 
  border-radius:5px; 
  border:1px solid #ccc; 
  height:35px;
}

.form-container select { min-width:150px; }
.form-container input { width:100px; height: 18px}

.form-container button { 
  padding:8px 12px; 
  font-size:14px; 
  font-weight:bold; 
  border:none; 
  border-radius:5px; 
  cursor:pointer; 
  color:white; 
  height:35px;
}

#btnActualizar { background:#28a745; }
#btnControlVenta { background:#ff7f00; }
#btnRegresar { background:#6c757d; }

/* 🔥 BOTON VERDE */
#btnLimiteVentaTotal { 
  background:green; 
}

#btnLimiteVentaTotal:hover { 
  background:darkgreen; 
}

.tabla-container { width:95%; margin:20px auto; overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:10px; text-align:left; }
th { background:#512BD4; color:white; position:sticky; top:0; }

/* 🔥 EN MOVIL SI BAJA (MEJOR UX) */
@media(max-width:500px){
  .form-container { 
    flex-wrap:wrap; 
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo-section">
    <img src="lote.png" alt="Logo">
    <span>Lottery</span>
  </div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
  <div id="menuDropdown" class="menu-dropdown">
    <button onclick="window.location.href='principal.html'">Principal</button>
    <button onclick="window.location.href='loterias.html'">Loterías</button>
    <button onclick="window.location.href='bancas.html'">Bancas</button>
    <button onclick="window.location.href='tickets.html'">Tickets</button>
    <button onclick="window.location.href='cambioclave.html'">Usuarios</button>
    <button onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">Cerrar Sesión</button>
  </div>
</div>

<div class="user-info" id="userInfo">Usuario: -- | Fecha/Hora: --</div>
<div class="titulo-bar">Pago de Loterías</div>

<div class="form-container">
  <select id="comboUsuario"><option value="">Cargando usuarios...</option></select>
  <select id="comboTipo">
    <option value="">Seleccione Tipo de Jugada</option>
    <option value="Primera">Primera</option>
    <option value="Segunda">Segunda</option>
    <option value="Tercera">Tercera</option>
    <option value="Pale12_13">Pale 1ra-2da</option>
    <option value="Pale23">Pale 2da-3ra</option>
    <option value="TripletaCompleta">Tripleta Completa</option>
    <option value="TripletaParcial">Tripleta Parcial</option>
    <option value="SuperPale">SuperPale</option>
  </select>
  <input type="number" id="txtMonto" placeholder="Monto">
  <button type="button" id="btnActualizar">Actualizar</button>
  <button type="button" id="btnControlVenta">Control Venta</button>
  <button type="button" id="btnLimiteVentaTotal" onclick="window.location.href='limiteventatotal.html'">Limite de Venta</button>
  <button type="button" id="btnRegresar" onclick="window.location.href='principal.html'">Regresar</button>
</div>

<div class="tabla-container">
  <table id="tablaLoterias">
    <thead>
      <tr>
        <th>NombreUsuario</th>
        <th>Primera</th>
        <th>Segunda</th>
        <th>Tercera</th>
        <th>Pale12_13</th>
        <th>Pale23</th>
        <th>TripletaCompleta</th>
        <th>TripletaParcial</th>
        <th>SuperPale</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

//control de cerrar solo 
// 🔒 control de inactividad
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

// 🔐 VALIDAR SESIÓN (ANTES DE TODO)
const usuarioGuardado = JSON.parse(localStorage.getItem("usuarioLogueado"));

if(!usuarioGuardado){
  window.location.replace("login.html");
}

// ✅ variables seguras
const usuarioLogueado = usuarioGuardado.nombre;
const tipoUsuario = usuarioGuardado.tipo;
const asignado = usuarioGuardado.asignado;

// 🔁 reset timer
function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

// 🔥 cerrar sesión automático
function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");

  // 🔥 NO permite volver atrás
  window.location.replace("login.html");
}

// 🎯 eventos de actividad
["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

// 🚀 iniciar control
resetTimer();

// 🔥 cerrar sesión si borran localStorage en otra pestaña
window.addEventListener("storage", function(e){
  if(e.key === "usuarioLogueado" && !e.newValue){
    window.location.replace("login.html");
  }
});
/* 🔥 MENU */
window.toggleMenu = () => {
  const menu = document.getElementById("menuDropdown");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
};
window.cerrarSesion = () => { alert("Sesión cerrada"); window.location.href = "index.html"; };

/* 🔥 INFO */
function actualizarUserInfo(){
  const now = new Date();
  document.getElementById("userInfo").innerHTML = `Usuario: ${usuarioLogueado} | Fecha/Hora: ${now.toLocaleString()}`;
}

const DEFAULT_MULTIPLIERS = {
  Primera: 60,
  Segunda: 8,
  Tercera: 4,
  Pale12_13: 1000,
  Pale23: 100,
  TripletaCompleta: 20000,
  TripletaParcial: 100,
  SuperPale: 3000
};

/* 🔥 CARGAR USUARIOS EN COMBO */
async function cargarUsuarios(){
  const combo = document.getElementById("comboUsuario");
  combo.innerHTML = "<option value=''>Cargando...</option>";
  try{
    const snapshot = await get(child(ref(db), "Usuarios"));
    const data = snapshot.val() || {};
    combo.innerHTML = "<option value=''>Seleccione Usuario</option>";
    for(const uid in data){
      const u = data[uid];
      // 👑 ADMINISTRADOR VE TODOS, ADM VE SOLO SU ASIGNADO
      if(usuarioGuardado.tipo === "Administrador" || u.Asignado === usuarioLogueado){
        const option = document.createElement("option");
        option.value = uid;
        option.textContent = u.NombreUsuario;
        combo.appendChild(option);
      }
    }
  }catch(e){
    alert("Error cargando usuarios: "+e.message);
  }
}

/* 🔥 CARGAR TABLA Loterias */
async function cargarTabla(){
  const tbody = document.querySelector("#tablaLoterias tbody");
  tbody.innerHTML = "<tr><td colspan='9'>Cargando...</td></tr>";

  try{
    const usuariosSnap = await get(child(ref(db), "Usuarios"));
    const multipSnap = await get(child(ref(db), "MultiplicadoresPremios"));
    const usuariosData = usuariosSnap.val() || {};
    const multipData = multipSnap.val() || {};

    tbody.innerHTML = "";
    for(const uid in usuariosData){
      const usuario = usuariosData[uid];

      // 👑 ADMINISTRADOR VE TODOS, ADM VE SOLO SU ASIGNADO
      if(usuarioGuardado.tipo !== "Administrador" &&
         usuario.Asignado !== usuarioLogueado &&
         usuario.NombreUsuario !== usuarioLogueado) continue;

      const multip = multipData[uid] || DEFAULT_MULTIPLIERS;

      tbody.innerHTML += `<tr>
        <td>${usuario.NombreUsuario}</td>
        <td>${multip.Primera || DEFAULT_MULTIPLIERS.Primera}</td>
        <td>${multip.Segunda || DEFAULT_MULTIPLIERS.Segunda}</td>
        <td>${multip.Tercera || DEFAULT_MULTIPLIERS.Tercera}</td>
        <td>${multip.Pale12_13 || DEFAULT_MULTIPLIERS.Pale12_13}</td>
        <td>${multip.Pale23 || DEFAULT_MULTIPLIERS.Pale23}</td>
        <td>${multip.TripletaCompleta || DEFAULT_MULTIPLIERS.TripletaCompleta}</td>
        <td>${multip.TripletaParcial || DEFAULT_MULTIPLIERS.TripletaParcial}</td>
        <td>${multip.SuperPale || DEFAULT_MULTIPLIERS.SuperPale}</td>
      </tr>`;
    }
  }catch(e){
    alert("Error cargando tabla: "+e.message);
  }
}

/* 🔥 BOTON ACTUALIZAR */
async function actualizarMonto(){
  const usuarioSel = document.getElementById("comboUsuario").value;
  const tipo = document.getElementById("comboTipo").value;
  const monto = document.getElementById("txtMonto").value.trim();

  if(!usuarioSel){ alert("Seleccione un usuario"); return; }
  if(!tipo){ alert("Seleccione un tipo de jugada"); return; }
  if(!monto || monto <=0){ alert("Ingrese un monto válido"); return; }

  try{
    const path = `MultiplicadoresPremios/${usuarioSel}`;
    await update(ref(db, path), {[tipo]: Number(monto)});
    alert("Monto actualizado correctamente");
    document.getElementById("txtMonto").value = "";
    cargarTabla();
  }catch(e){
    alert("Error al actualizar: "+e.message);
  }
}

/* 🔥 BOTON CONTROL VENTA */
document.getElementById("btnControlVenta").addEventListener("click", ()=>{
  window.location.href = "controlventas.html";
});

window.addEventListener("DOMContentLoaded", ()=>{
  actualizarUserInfo();
  setInterval(actualizarUserInfo,1000);
  cargarUsuarios();
  cargarTabla();
  document.getElementById("btnActualizar").addEventListener("click", actualizarMonto);
});
</script>

</body>
</html>
