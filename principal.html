<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LOTTERY SYSTEMS - Principal</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }

  .topbar { 
    background:#512BD4; 
    color:white; 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
    padding:10px 20px; 
    position:relative;
  }

  .logo-section { display:flex; align-items:center; }
  .logo-section img { height:40px; margin-right:10px; }
  .logo-section span { font-size:20px; font-weight:bold; }

  .hamburger {
    font-size:26px;
    cursor:pointer;
    user-select:none;
  }

  .menu-dropdown {
    position:absolute;
    top:60px;
    right:20px;
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    display:none;
    flex-direction:column;
    min-width:200px;
    z-index:999;
  }

  .menu-dropdown button {
    padding:12px;
    border:none;
    background:white;
    text-align:left;
    cursor:pointer;
    font-weight:bold;
    border-bottom:1px solid #eee;
  }

  .menu-dropdown button:hover {
    background:#f2f2f2;
  }

  .user-info { 
    width:100%; 
    background:#e0d4ff; 
    display:flex; 
    justify-content:flex-end; 
    padding:5px 20px; 
    font-size:14px; 
    color:#333; 
  }

  .premios-bar { 
    width:93.5%; 
    height:45px; 
    margin:10px auto 0; 
    background:#512BD4; 
    color:white; 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
    padding:10px; 
  }

  .date-picker { display:flex; gap:10px; }

  .tabla-container { 
    width:95%; 
    margin:20px auto; 
    height:calc(100vh - 300px); 
    overflow-y:auto; 
    background:white; 
    border-radius:5px; 
    box-shadow:0 0 10px rgba(0,0,0,0.1); 
  }

  table { width:100%; border-collapse:collapse; }
  th, td { border:1px solid #ccc; padding:10px; text-align:center; }
  th { background:#512BD4; color:white; position:sticky; top:0; }

  .cerrada { background-color:#ffffff; color:blue; font-weight:bold; }
  .sin-resultado { background-color:#ffffff; color:red; font-weight:bold; }

  .actions { 
    display:flex; 
    justify-content:center; 
    gap:20px; 
    margin:10px auto; 
    flex-wrap:wrap;
  }

  .actions button { 
    width:600px; 
    height:150px; 
    display:flex; 
    flex-direction:column; 
    align-items:center; 
    justify-content:center; 
    border:none; 
    border-radius:10px; 
    background:#512BD4; 
    color:white; 
    cursor:pointer; 
    font-weight:bold; 
  }

  .button-title { font-size:35px; }
  .button-subtext { font-size:13px; color:#eee; }

</style>
</head>

<body>

<div class="topbar">
  <div class="logo-section">
    <img src="lote.png" alt="Logo">
    <span>Lottery</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <div id="menuDropdown" class="menu-dropdown">
    <button onclick="window.location.href='loterias.html'">Loterías</button>
    <button onclick="window.location.href='bancas.html'">Banca</button>
    <button onclick="window.location.href='tickets.html'">Ticket</button>
    <button onclick="window.location.href='cambioclave.html'">Usuarios</button>
    <button onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">Cerrar Sesión</button>
  </div>
</div>

<div class="user-info" id="userInfo">Usuario: -- | Fecha/Hora: --</div>

<div class="premios-bar">
  <h2>Premios</h2>
  <div class="date-picker">
    <input type="date" id="fechaPremio">
    <button onclick="cargarPremios()">Buscar</button>
  </div>
</div>

<div class="tabla-container">
  <table id="tablaPremios">
    <thead>
      <tr>
        <th>Lotería</th>
        <th><span style="white-space: nowrap;">1ro 2do 3ro</span></th>
        <th>Horario Cierre</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="actions">
  <button class="monitor">
    <span class="button-title">Monitor</span>
    <span class="button-subtext">Monitorear productos</span>
  </button>

  <button class="reportes">
    <span class="button-title">Reportes</span>
    <span class="button-subtext">Reportes del sistema</span>
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";



/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

/* 🔥 USUARIO */
const usuarioGuardado = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = usuarioGuardado ? usuarioGuardado.nombre : "Invitado";

/* 🔥 MENU */
window.toggleMenu = () => {
  const menu = document.getElementById("menuDropdown");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
};

window.cerrarSesion = () => { 
  alert("Sesión cerrada"); 
  window.location.href = "index.html"; 
};


function hoyLocal(){
  const fecha = new Date();
  const yyyy = fecha.getFullYear();
  const mm = String(fecha.getMonth() + 1).padStart(2, '0');
  const dd = String(fecha.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

/* 🔥 INFO */
function actualizarUserInfo(){
  const now = new Date();
  document.getElementById("userInfo").innerHTML =
    `Usuario: ${usuarioLogueado} | Fecha/Hora: ${now.toLocaleString()}`;
}

/* 🔥 MONITOR BTN */
document.querySelector(".monitor").addEventListener("click", () => {
  window.location.href = "monitor.html";
});

/* 🔥 reportes BTN */
document.querySelector(".reportes").addEventListener("click", () => {
  window.location.href = "reportes.html";
});

/* 🔥 PREMIOS */
async function cargarPremios(fechaSeleccionada = null){
  let fecha = fechaSeleccionada || hoyLocal();

  const tbody = document.querySelector("#tablaPremios tbody");
  tbody.innerHTML = "<tr><td colspan='3'>Cargando...</td></tr>";

  const resultadosSnap = await get(child(ref(db), "Resultados"));
  const resultadosData = resultadosSnap.val() || {};
  const loteriasSnap = await get(child(ref(db), "TodasLasLoterias"));
  const loteriasData = loteriasSnap.val() || {};

  tbody.innerHTML = "";
  const ahora = new Date();

  for(const clave in resultadosData){
    const res = resultadosData[clave][fecha];
    const horarioStr = loteriasData[clave]?.HorarioCierre || "—";

    const fila = document.createElement("tr");

    let horarioCierre = null;
    if(horarioStr && horarioStr !== "—"){
      const [hora, minuto] = horarioStr.split(":").map(Number);
      horarioCierre = new Date();
      horarioCierre.setHours(hora, minuto, 0, 0);
    }

    let segundoTd = "";
    if(res && res.PrimerPremio){
      segundoTd = `<span style="white-space: nowrap; color:#0D1DB8">${res.PrimerPremio} - ${res.SegundoPremio} - ${res.TercerPremio}</span>`; fila.style.color = "#0D1DB8"
    } else if(horarioCierre && ahora < horarioCierre){
      segundoTd = "Activo";
      fila.style.color = "green"; // toda la fila verde
    } else {
      segundoTd = "Sin resultado";
      fila.classList.add("sin-resultado");
    }

    fila.innerHTML = `
      <td>${res?.LoteriaNombre || clave}</td>
      <td>${segundoTd}</td>
      <td>${horarioStr}</td>
    `;
    tbody.appendChild(fila);
  }
}

/* 🔥 INIT */
window.onload = () => {
  actualizarUserInfo();
  setInterval(actualizarUserInfo,1000);
  document.getElementById("fechaPremio").value = hoyLocal();
  cargarPremios();
};

document.getElementById("fechaPremio").addEventListener("change", e => {
  cargarPremios(e.target.value);
});
</script>
<script>
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000; // 5 minutos

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  location.reload();
}

// Eventos que reinician el contador
["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

// Iniciar contador
resetTimer();
</script>
</body>
</html>
