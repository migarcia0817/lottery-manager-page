<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte General de Ventas</title>

<script src="seguridad.js"></script>

<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
.topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px 20px; position:relative; }
.logo-section { display:flex; align-items:center; }
.logo-section span { font-size:20px; font-weight:bold; }
.hamburger { font-size:26px; cursor:pointer; user-select:none; }
.menu-dropdown { position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2); display:none; flex-direction:column; min-width:200px; z-index:999; }
.menu-dropdown button { padding:12px; border:none; background:white; text-align:left; cursor:pointer; font-weight:bold; border-bottom:1px solid #eee; }
.menu-dropdown button:hover { background:#f2f2f2; }
.user-info { width:100%; background:#e0d4ff; display:flex; justify-content:flex-end; padding:5px 20px; font-size:14px; color:#333; }
.titulo-bar { width:95%; margin:20px auto; padding:10px; background:#512BD4; color:white; font-size:20px; font-weight:bold; border-radius:5px; text-align:center; }

.filtros { width:95%; max-width:900px; margin:10px auto; display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.filtros select, .filtros input, .filtros button { padding:10px; font-size:14px; border-radius:5px; border:1px solid #ccc; }
.filtros button { cursor:pointer; color:white; font-weight:bold; }
#btnBuscar { background:#28a745; }
#btnImprimir { background:#ff7f00; }
#btnRegresar { background:#6c757d; }

.tabla-container { width:95%; max-width:1200px; margin:20px auto; overflow-x:auto; }
table { width:100%; border-collapse:collapse; background:white; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#512BD4; color:white; position:sticky; top:0; }

.totales { width:95%; max-width:1200px; margin:10px auto; display:flex; justify-content:flex-end; gap:15px; font-weight:bold; flex-wrap:wrap; }

@media(max-width:768px){
  .filtros { flex-direction:column; }
  .filtros select, .filtros input, .filtros button { width:100%; }
  .totales { flex-direction:column; align-items:flex-end; gap:5px; }
  table th, table td { padding:6px; font-size:12px; }
}
@media(max-width:480px){
  .titulo-bar { font-size:16px; padding:8px; }
  .topbar { flex-direction:column; align-items:flex-start; padding:10px; gap:5px; }
  .user-info { font-size:12px; padding:5px 10px; }
}

<style>
.topbar {
  background:#512BD4;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
}

.logo-section {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-section img {
  height:40px;
  width:40px;
  object-fit:contain;
}

.logo-section span {
  font-size:18px;
  font-weight:bold;
  line-height:40px;
}
</style>
</style>
</head>

<body>

<div class="topbar">
  <div class="logo-section">
    <img src="lote.png" alt="logo">
    <span>Lottery</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>
  <div id="menuDropdown" class="menu-dropdown">
    <button onclick="window.location.href='principal.html'">Principal</button>
    <button onclick="window.location.href='loterias.html'">Loterías</button>
    <button onclick="window.location.href='bancas.html'">Bancas</button>
    <button onclick="window.location.href='tickets.html'">Tickets</button>
    <button onclick="window.location.href='cambioclave.html'">Cambio Clave</button>
    <button onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">Cerrar Sesión</button>
  </div>
</div>

<div class="user-info" id="userInfo">Usuario: -- | Fecha/Hora: --</div>
<div class="titulo-bar">Reporte General de Ventas</div>

<div class="filtros">
  <select id="comboUsuario"><option value="todos">Todos</option></select>
  <input type="date" id="fechaDesde" />
  <input type="date" id="fechaHasta" />
  <button id="btnBuscar">Buscar</button>
  <button id="btnImprimir">Imprimir</button>
  <button id="btnRegresar" onclick="window.location.href='reportes.html'">Regresar</button>
</div>

<div class="tabla-container">
  <table>
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Total Venta</th>
        <th>Total Comisión</th>
        <th>Total Premio</th>
        <th>Total Neto</th>
      </tr>
    </thead>
    <tbody id="tablaVentas"><tr><td colspan="5">Cargando...</td></tr></tbody>
  </table>
</div>

<div class="totales">
  <div>Total Venta: <span id="totalVenta">0</span></div>
  <div>Total Comisión: <span id="totalComision">0</span></div>
  <div>Total Premio: <span id="totalPremio">0</span></div>
  <div>Total Neto: <span id="totalNeto">0</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

//contro de cerrar solo 
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  window.location.href = "index.html";
}

["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

const usuarioGuardado = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = usuarioGuardado ? usuarioGuardado.nombre : "Invitado";

window.toggleMenu = () => {
  const menu = document.getElementById("menuDropdown");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
};

function actualizarUserInfo(){
  const now = new Date();
  document.getElementById("userInfo").innerHTML = `Usuario: ${usuarioLogueado} | Fecha/Hora: ${now.toLocaleString()}`;
}

function fechaLocalHoy(){
  const hoy = new Date();
  const y = hoy.getFullYear();
  const m = String(hoy.getMonth() + 1).padStart(2,'0');
  const d = String(hoy.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

async function cargarUsuarios() {
  const combo = document.getElementById("comboUsuario");
  combo.innerHTML = "<option value='todos'>Todos</option>";
  
  const supervisorID = usuarioGuardado?.id || usuarioGuardado?.uid || usuarioGuardado?.Id;
  const tipo = usuarioGuardado?.tipo || "";

  try {
    const snap = await get(child(ref(db), "Usuarios"));
    const data = snap.val() || {};

    let usuariosPermitidos = [];
    if (tipo === "Supervisor") {
      const gruposSnap = await get(child(ref(db), "Grupos"));
      const gruposData = gruposSnap.val() || {};
      for (const gId in gruposData) {
        if (String(gruposData[gId].supervisor) === String(supervisorID)) {
          usuariosPermitidos = gruposData[gId].usuarios || [];
          break;
        }
      }
    }

    for (const uid in data) {
      const u = data[uid];
      const nombreU = u.NombreUsuario;
      const idU = String(u.Id);
      let mostrar = false;

      if (tipo === "Administrador") {
        mostrar = true;
      } else if (tipo === "ADM" && u.Asignado === usuarioLogueado) {
        mostrar = true;
      } else if (tipo === "Supervisor" && usuariosPermitidos.includes(idU)) {
        mostrar = true;
      }

      if (mostrar) {
        const option = document.createElement("option");
        option.value = nombreU;
        option.textContent = nombreU;
        combo.appendChild(option);
      }
    }
  } catch (e) { 
    alert("Error cargando usuarios: " + e.message); 
  }
}

async function buscarVentas() {
  const usuarioSel = document.getElementById("comboUsuario").value;
  const desde = document.getElementById("fechaDesde").value;
  const hasta = document.getElementById("fechaHasta").value;

  if (!desde || !hasta) { alert("Seleccione fechas"); return; }

  const permitidos = Array.from(document.querySelectorAll("#comboUsuario option"))
    .map(o => o.value)
    .filter(v => v !== "todos");

  const tbody = document.getElementById("tablaVentas");
  tbody.innerHTML = "<tr><td colspan='5'>Cargando...</td></tr>";

  try {
    const snap = await get(child(ref(db), "ventas"));
    const ventas = snap.val() || {};

    const usuariosTotales = {};
    let totalVenta = 0, totalComision = 0, totalPremio = 0, totalNeto = 0;
    const tipo = usuarioGuardado?.tipo || "";

    for (const id in ventas) {
      const v = ventas[id];
      const usuarioVenta = v.NombreUsuario || v.nombreUsuario || "Desconocido";

      if (tipo !== "Administrador" && !permitidos.includes(usuarioVenta)) continue;
      if (usuarioSel !== "todos" && usuarioVenta !== usuarioSel) continue;

      const fechaRaw = v.FechaCreacion || v.fechaCreacion;
      if (!fechaRaw) continue;

      const fechaVenta = new Date(fechaRaw);
      const fechaStr = `${fechaVenta.getFullYear()}-${String(fechaVenta.getMonth() + 1).padStart(2, '0')}-${String(fechaVenta.getDate()).padStart(2, '0')}`;
      
      if (fechaStr < desde || fechaStr > hasta) continue;

      const ventaMonto = Number(v.TotalNeto || v.totalNeto || 0);
      const premio = Number(v.PremioCalculado || v.premioCalculado || v.Premio || v.premio || 0);

      /* 🔥 COMISIÓN CORREGIDA */
      let porcentaje = 0;

      const userId = v.idUsuario || v.IdUsuario || v.usuarioId || v.UsuarioId;

      if (userId) {
        const comSnap = await get(child(ref(db), `Comisiones/${userId}/porcentaje`));
        if (comSnap.exists()) {
          porcentaje = Number(comSnap.val()) || 0;
        }
      }

      const comision = ventaMonto * (porcentaje / 100);
      const neto = ventaMonto - premio - comision;

      if (!usuariosTotales[usuarioVenta]) {
        usuariosTotales[usuarioVenta] = { venta: 0, comision: 0, premio: 0, neto: 0 };
      }

      usuariosTotales[usuarioVenta].venta += ventaMonto;
      usuariosTotales[usuarioVenta].comision += comision;
      usuariosTotales[usuarioVenta].premio += premio;
      usuariosTotales[usuarioVenta].neto += neto;
    }

    tbody.innerHTML = "";

    if (Object.keys(usuariosTotales).length === 0) {
      tbody.innerHTML = "<tr><td colspan='5'>No hay ventas en este período</td></tr>";
    } else {
      for (const usuario in usuariosTotales) {
        const v = usuariosTotales[usuario];

        totalVenta += v.venta;
        totalComision += v.comision;
        totalPremio += v.premio;
        totalNeto += v.neto;

        tbody.innerHTML += `<tr>
          <td>${usuario}</td>
          <td>${v.venta.toFixed(2)}</td>
          <td>${v.comision.toFixed(2)}</td>
          <td>${v.premio.toFixed(2)}</td>
          <td>${v.neto.toFixed(2)}</td>
        </tr>`;
      }
    }

    document.getElementById("totalVenta").textContent = totalVenta.toFixed(2);
    document.getElementById("totalComision").textContent = totalComision.toFixed(2);
    document.getElementById("totalPremio").textContent = totalPremio.toFixed(2);
    document.getElementById("totalNeto").textContent = totalNeto.toFixed(2);

  } catch (e) {
    alert("Error cargando datos: " + e.message);
  }
}

document.getElementById("btnBuscar").addEventListener("click", buscarVentas);
document.getElementById("btnImprimir").addEventListener("click", ()=>{ window.print(); });

window.addEventListener("DOMContentLoaded", async ()=>{
  actualizarUserInfo();
  setInterval(actualizarUserInfo, 1000);
  
  await cargarUsuarios();

  const hoy = fechaLocalHoy();
  document.getElementById("fechaDesde").value = hoy;
  document.getElementById("fechaHasta").value = hoy;

  setTimeout(() => {
    buscarVentas(hoy, hoy);
  }, 300);
});
</script>

</body>
</html>
