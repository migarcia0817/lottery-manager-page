<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Más Vendido - Lottery Systems</title>

<script src="seguridad.js"></script>

<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
  .topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px 20px; position: relative;}
  .logo-section { display:flex; align-items:center; }
  .logo-section img { height:40px; margin-right:10px; }
  .logo-section span { font-size:20px; font-weight:bold; }
  .hamburger { font-size:26px; cursor:pointer; user-select:none; }

  .menu-dropdown {
    display:none; position:absolute; right:20px; top:60px; background:white;
    border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.2); z-index:1000; min-width: 200px;
  }
  .menu-dropdown.show { display: block; }
  .menu-dropdown a { display:block; width:100%; border:none; background:white; padding:12px; text-align:left; cursor:pointer; color:#000; text-decoration: none; font-size:15px; border-bottom: 1px solid #ddd; }
  .menu-dropdown a:hover { background:#f0f0f0; }

  .user-info { width:100%; background:#e0d4ff; display:flex; justify-content:flex-end; padding:5px 20px; font-size:14px; color:#333; box-sizing: border-box; }

  .monitor-bar { 
  width: 95%; 
  margin: 10px auto; 
  background: #512BD4; 
  color: white; 
  padding: 10px 15px; /* Reducimos padding vertical */
  border-radius: 8px; 
  display: flex; 
  flex-direction: row; /* Alinea todo en horizontal */
  flex-wrap: nowrap;   /* Evita que se salten de línea */
  gap: 10px;           /* Espacio pequeño entre elementos */
  align-items: center; /* Centra verticalmente los elementos */
  justify-content: space-between; /* Distribuye el espacio */
  box-sizing: border-box;
}

.monitor-bar h2 { 
  margin: 0; 
  font-size: 18px; /* Reducimos un poco el título para que quepa todo */
  white-space: nowrap; /* Evita que el título se rompa en dos líneas */
}

/* Ajuste para que los grupos internos también se alineen */
.filters-row, .monitor-buttons {
  display: flex;
  flex-direction: row;
  gap: 8px;
  align-items: center;
}

/* Ajuste para que los inputs no se estiren demasiado */
.filters-row input, .filters-row select {
  width: auto;
  min-width: 100px;
  padding: 8px; /* Reduje un poco el padding */
    border-radius: 5px; 
    border: none; 
    outline: none; 
    flex: 0 1 150px; /* No crecen demasiado, base de 120px */
    min-width: 110px; /* Tamaño mínimo más pequeño */
    font-size: 13px; /* Fuente un poco más pequeña */
}
  
  .btn-buscar { 
    background:#28a745; color:#fff; border: none; padding: 10px 25px; 
    border-radius: 5px; cursor: pointer; font-weight: bold; flex: 0 1 auto;
  }
  .btn-buscar:hover { background: #218838; }

  .monitor-buttons { display:flex; gap:10px; flex-wrap:wrap; }
  .monitor-buttons button { 
    background:#fff; color:#512BD4; border:none; padding:8px 15px; 
    border-radius:5px; cursor:pointer; font-weight:bold; flex: 1 1 auto; max-width: 180px;
  }

  .tabla-container { width:95%; margin:10px auto; height:calc(100vh - 280px); overflow:auto; background:white; border-radius:5px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
  table { width:100%; border-collapse:collapse; }
  th, td { border:1px solid #ccc; padding:10px; text-align:center; }
  th { background:#512BD4; color:white; position:sticky; top:0; z-index:2; }

  @media (max-width: 600px) {
    .filters-row input, .filters-row select, .btn-buscar { flex: 1 1 100%; }
    .monitor-bar h2 { text-align: center; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-section"><img src="lote.png"><span>Lottery</span></div>
  <div class="menu-right">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div id="menuDropdown" class="menu-dropdown">
      <a href="principal.html">Principal</a>
      <a href="monitor.html">Monitor</a>
      <a href="reportes.html">Reportes</a>
      <a href="javascript:void(0)" onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">Cerrar Sesión</a>
    </div>
  </div>
</div>

<div class="user-info" id="userInfo"></div>

<div class="monitor-bar">
  <h2>Más Vendido</h2>
  <div class="filters-row">
    <input type="date" id="fechaSeleccionada">
    <select id="comboUsuario"><option value="">Cargando Usuarios...</option></select>
    <select id="comboLoteria"><option value="">Todas</option></select>
    <button class="btn-buscar" id="btnBuscar">BUSCAR</button>
  </div>
  <div class="monitor-buttons">
    <button onclick="window.location.href='monitor.html'">Resumen Venta</button>
    <button onclick="window.location.href='principal.html'">Regresar</button>
  </div>
</div>

<div class="tabla-container">
  <table id="tablaMasVendido">
    <thead>
      <tr>
        <th>Grupo</th>
        <th>Número</th>
        <th>Veces</th>
        <th>Monto Total</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const app = initializeApp({ apiKey: "TU_API_KEY", databaseURL: "https://bancachupon-default-rtdb.firebaseio.com" });
const db = getDatabase(app);

const userData = JSON.parse(localStorage.getItem("usuarioLogueado"));
const tipoUsuario = userData?.tipo || "";
const usuarioLogueadoID = userData?.id || userData?.uid || userData?.Id;

window.toggleMenu = () => document.getElementById("menuDropdown").classList.toggle("show");

async function cargarFiltros() {
    const lotSnap = await get(child(ref(db), "TodasLasLoterias"));
    const lotData = lotSnap.val() || {};
    const comboLot = document.getElementById("comboLoteria");
    for (const key in lotData) {
        comboLot.innerHTML += `<option value="${key}">${lotData[key].LoteriaNombre}</option>`;
    }

    const userSnap = await get(child(ref(db), "Usuarios"));
    const users = userSnap.val() || {};
    const comboUser = document.getElementById("comboUsuario");
    comboUser.innerHTML = '<option value="TODOS">Todos</option>';

    let permitidos = [];
    if (tipoUsuario === "Supervisor") {
        const grupSnap = await get(child(ref(db), "Grupos"));
        const grupos = grupSnap.val() || {};
        for (const g in grupos) {
            if (String(grupos[g].supervisor) === String(usuarioLogueadoID)) {
                permitidos = grupos[g].usuarios || [];
                break;
            }
        }
    }

    for (const id in users) {
        const u = users[id];
        let ok = false;
        if (tipoUsuario === "Administrador") ok = true;
        else if (tipoUsuario === "Supervisor" && permitidos.includes(String(u.Id))) ok = true;
        else if (tipoUsuario === "ADM" && (u.Asignado === userData.nombre || u.NombreUsuario === userData.nombre)) ok = true;

        if (ok) comboUser.innerHTML += `<option value="${u.Id}">${u.NombreUsuario}</option>`;
    }
}

async function cargarMasVendido() {
    const fecha = document.getElementById("fechaSeleccionada").value;
    const usuarioFiltro = document.getElementById("comboUsuario").value;
    const loteriaFiltro = document.getElementById("comboLoteria").value;
    if (!fecha) return;

    const tbody = document.querySelector("#tablaMasVendido tbody");
    tbody.innerHTML = "<tr><td colspan='4'>Cargando...</td></tr>";

    const ventasSnap = await get(child(ref(db), "ventas"));
    const ventasData = ventasSnap.val() || {};
    const permitidosIds = Array.from(document.getElementById("comboUsuario").options).map(o => o.value);

    const grupos = { "Quiniela": {}, "Pale": {}, "Tripleta": {}, "SuperPale": {} };

    for (const key in ventasData) {
        const v = ventasData[key];
        const fVenta = (v.fechaCreacion || v.FechaCreacion || "").split("T")[0];
        const uVenta = String(v.usuarioId || "");
        const lVenta = v.loteriasAsociadasClave || "";

        if (fVenta !== fecha) continue;
        if (usuarioFiltro === "TODOS" && !permitidosIds.includes(uVenta) && tipoUsuario !== "Administrador") continue;
        if (usuarioFiltro !== "TODOS" && uVenta !== usuarioFiltro) continue;
        if (loteriaFiltro && lVenta !== loteriaFiltro) continue;

        const proc = (arr, target) => {
            if (arr && Array.isArray(arr)) {
                arr.forEach(i => {
                    const n = i.numeros;
                    const m = Number(i.montoDecimal || i.monto || 0);
                    if (!target[n]) target[n] = { veces: 0, monto: 0 };
                    target[n].veces++;
                    target[n].monto += m;
                });
            }
        };
        proc(v.quinielas, grupos.Quiniela);
        proc(v.pales, grupos.Pale);
        proc(v.tripletas, grupos.Tripleta);
        proc(v.superPales, grupos.SuperPale);
    }

    tbody.innerHTML = "";
    for (const g in grupos) {
        const arr = Object.keys(grupos[g]).map(n => ({ n, ...grupos[g][n] })).sort((a,b) => b.veces - a.veces).slice(0, 10);
        if (arr.length === 0) {
            tbody.innerHTML += `<tr><td>${g}</td><td colspan="3">No hay ventas</td></tr>`;
        } else {
            arr.forEach((it, idx) => {
                const color = idx === 0 ? "background:#ffd700" : idx === 1 ? "background:#c0c0c0" : idx === 2 ? "background:#cd7f32" : "";
                tbody.innerHTML += `<tr style="${color}"><td>${g}</td><td>${it.n}</td><td>${it.veces}</td><td>${it.monto.toFixed(2)}</td></tr>`;
            });
        }
    }
}

window.onload = async () => {
    const fHoy = new Date().toISOString().split("T")[0];
    document.getElementById("fechaSeleccionada").value = fHoy;
    document.getElementById("userInfo").innerHTML = `Usuario: ${userData?.nombre} | Fecha: ${new Date().toLocaleDateString()}`;
    await cargarFiltros();
    cargarMasVendido();
    document.getElementById("btnBuscar").onclick = cargarMasVendido;
};
</script>
</body>
</html>
