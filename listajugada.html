<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Jugadas</title>

<script src="seguridad.js"></script>

<link rel="icon" type="image/png" href="favicon.png?v=1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family: Arial; background:#f9f9f9; }
.topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; padding:10px 20px; }
.hamburger { font-size:26px; cursor:pointer; }
.menu-dropdown { position:absolute; top:60px; right:20px; background:white; display:none; flex-direction:column; box-shadow:0 0 10px rgba(0,0,0,0.2); }
.menu-dropdown button { padding:10px; border:none; background:white; cursor:pointer; }

.user-info { background:#e0d4ff; padding:5px 20px; text-align:right; }
.titulo-bar { width:95%; margin:20px auto; background:#512BD4; color:white; padding:10px; text-align:center; }
.grupo-label { width:95%; margin:auto; font-weight:bold; }

.filtros { width:95%; margin:10px auto; display:flex; flex-wrap:wrap; gap:10px; }
.filtros input, .filtros select, .filtros button { padding:10px; border-radius:5px; }

#btnBuscar { background:#28a745; color:white; }
#btnImprimir { background:#ff7f00; color:white; }
#btnRegresar { background:#6c757d; color:white; }

.resumen { width:95%; margin:15px auto; background:white; padding:10px; font-weight:bold; }

.tabla-container { width:95%; margin:auto; }

table { width:100%; border-collapse:collapse; background:white; margin-bottom:20px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
th { background:#512BD4; color:white; }

h3 { text-align:center; margin-top:20px; }
</style>
</head>

<body>

<div class="topbar">
  <div style="font-size: 18px; font-weight: bold;">Lottery</div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<div id="menuDropdown" class="menu-dropdown">
  <button onclick="window.location.href='principal.html'">Principal</button>
  <button onclick="window.location.href='loterias.html'">Loterías</button>
  <button onclick="window.location.href='bancas.html'">Banca</button>
  <button onclick="window.location.href='tickets.html'">Ticket</button>
  <button onclick="window.location.href='cambioclave.html'">Usuario</button>
  <button onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">
</div>

<div class="user-info" id="userInfo"></div>
<div class="titulo-bar">Lista de Jugadas</div>
<div class="grupo-label" id="grupoLabel"></div>

<div class="filtros">
  <select id="comboUsuario"></select>
  <input type="date" id="fecha">
  <select id="comboLoteria"></select>

  <button id="btnBuscar">Buscar</button>
  <button id="btnImprimir">Imprimir</button>
  <button id="btnRegresar">Regresar</button>
</div>

<div class="resumen">
  Fecha: <span id="resFecha">--</span> |
  Lotería: <span id="resLoteria">--</span> |
  Total: RD$ <span id="resTotal">0</span>
</div>

<div class="tabla-container">

<h3>QUINIELA</h3>
<table>
  <thead>
    <tr>
      <th>Número</th>
      <th>Monto</th>
      <th>Número</th>
      <th>Monto</th>
    </tr>
  </thead>
  <tbody id="tablaQuiniela"></tbody>
</table>

<h3>PALES</h3>
<table>
<thead><tr><th>Número</th><th>Monto</th></tr></thead>
<tbody id="tablaPale"></tbody>
</table>

<h3>TRIPLETAS</h3>
<table>
<thead><tr><th>Número</th><th>Monto</th></tr></thead>
<tbody id="tablaTripleta"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

//contro de cerrar solo 
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  window.location.href = "login.html";
}

["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

const userData = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = userData?.nombre || "Invitado";

const tipoUsuario = userData?.tipo || "ADM";
const asignado = userData?.Asignado || usuarioLogueado;

// menú
window.toggleMenu = ()=>{
  const m = document.getElementById("menuDropdown");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
};

window.logout = ()=>{
  localStorage.removeItem("usuarioLogueado");
  location.href="index.html";
};

// info usuario
function actualizarInfo(){
  document.getElementById("userInfo").innerText =
    "Usuario: " + usuarioLogueado + " | " + new Date().toLocaleString();
  document.getElementById("grupoLabel").innerText =
    "Grupo: " + usuarioLogueado;
}

// fecha hoy
function fechaHoy(){
  return new Date().toISOString().split("T")[0];
}

// usuarios
// usuarios con filtro de Supervisor por Grupo
async function cargarUsuarios(){
  const combo = document.getElementById("comboUsuario");
  combo.innerHTML = `<option value="TODOS" selected>TODOS</option>`;

  // Datos del supervisor desde el login
  const supervisorID = userData?.id || userData?.uid || userData?.Id;

  const snap = await get(child(ref(db),"Usuarios"));
  const data = snap.val() || {};

  // Si es Supervisor, buscamos sus usuarios permitidos primero
  let usuariosPermitidos = [];
  if (tipoUsuario === "Supervisor") {
    const gruposSnap = await get(child(ref(db), "Grupos"));
    const gruposData = gruposSnap.val() || {};
    for (const gId in gruposData) {
      if (String(gruposData[gId].supervisor) === String(supervisorID)) {
        usuariosPermitidos = gruposData[gId].usuarios || [];
        break;
      }
    }
  }

  for(const id in data){
    const u = data[id];
    const nombre = u.NombreUsuario;
    const idU = String(u.Id);

    if(tipoUsuario === "Administrador"){
      combo.innerHTML += `<option value="${nombre}">${nombre}</option>`;
    }
    else if(tipoUsuario === "ADM" && u.Asignado === asignado){
      combo.innerHTML += `<option value="${nombre}">${nombre}</option>`;
    }
    else if(tipoUsuario === "Supervisor" && usuariosPermitidos.includes(idU)){
      combo.innerHTML += `<option value="${nombre}">${nombre}</option>`;
    }
  }
}




// loterías
async function cargarLoterias(){
  const combo = document.getElementById("comboLoteria");
  combo.innerHTML = "<option value=''>Todas las Loterías</option>";

  const snap = await get(child(ref(db),"TodasLasLoterias"));
  const data = snap.val() || {};

  const lista = Object.values(data);
  lista.sort((a,b)=> a.HorarioCierre.localeCompare(b.HorarioCierre));

  lista.forEach(l=>{
    combo.innerHTML += `<option value="${l.KeyLoteria}">${l.LoteriaNombre}</option>`;
  });
}

// buscar

// buscar con filtro de seguridad para Supervisor
document.getElementById("btnBuscar").addEventListener("click", async ()=>{

  const usuario = document.getElementById("comboUsuario").value || "TODOS";
  const fecha = document.getElementById("fecha").value;
  const loteria = document.getElementById("comboLoteria").value;

  // Lista de usuarios que este supervisor/adm tiene permiso de ver
  const permitidos = Array.from(document.querySelectorAll("#comboUsuario option"))
    .map(o => o.value)
    .filter(v => v !== "TODOS");

  const snap = await get(child(ref(db),"ventas"));
  const data = snap.val() || {};

  let total = 0;
  let quiniela = {};
  let pale = {};
  let tripleta = {};

  for(let i=0;i<100;i++){
    let n = i.toString().padStart(2,'0');
    quiniela[n] = 0;
  }

  document.getElementById("tablaQuiniela").innerHTML = "";
  document.getElementById("tablaPale").innerHTML = "";
  document.getElementById("tablaTripleta").innerHTML = "";

  for(const id in data){
    const v = data[id];
    const usuarioVenta = v.nombreUsuario || "";

    // 🔥 FILTRO DE SEGURIDAD PARA ROLES (Supervisor/ADM)
    if (tipoUsuario !== "Administrador" && !permitidos.includes(usuarioVenta)) continue;
    
    // Filtro de selección manual
    if(usuario !== "TODOS" && usuarioVenta !== usuario) continue;

    const f = (v.fechaCreacion || "").substring(0,10);
    if(fecha && f !== fecha) continue;

    if(loteria && v.loteriasAsociadasClave !== loteria) continue;

    (v.quinielas || []).forEach(q=>{
      quiniela[q.numeros] += q.monto;
      total += q.monto;
    });

    (v.pales || []).forEach(p=>{
      pale[p.numeros] = (pale[p.numeros]||0)+p.monto;
      total += p.monto;
    });

    (v.tripletas || []).forEach(t=>{
      tripleta[t.numeros] = (tripleta[t.numeros]||0)+t.monto;
      total += t.monto;
    });
  }

  // (El resto del código de renderizado de tablas se mantiene igual...)
  if(total === 0){
    document.getElementById("resTotal").innerText = "0.00";
    document.getElementById("resFecha").innerText = fecha || "--";
    document.getElementById("resLoteria").innerText = loteria || "Todas";
    return;
  }

  // Re-renderizar tablas como lo tenías
  const tablaQ = document.getElementById("tablaQuiniela");
  for(let i=0;i<50;i++){
    let n1 = i.toString().padStart(2,'0');
    let n2 = (i+50).toString().padStart(2,'0');
    tablaQ.innerHTML += `<tr><td>${n1}</td><td>${quiniela[n1].toFixed(2)}</td><td>${n2}</td><td>${quiniela[n2].toFixed(2)}</td></tr>`;
  }

  const tablaP = document.getElementById("tablaPale");
  for(const num in pale){
    tablaP.innerHTML += `<tr><td>${num}</td><td>${pale[num].toFixed(2)}</td></tr>`;
  }

  const tablaT = document.getElementById("tablaTripleta");
  for(const num in tripleta){
    tablaT.innerHTML += `<tr><td>${num}</td><td>${tripleta[num].toFixed(2)}</td></tr>`;
  }

  document.getElementById("resFecha").innerText = fecha || "--";
  document.getElementById("resLoteria").innerText = loteria || "Todas";
  document.getElementById("resTotal").innerText = total.toFixed(2);
});


// botones
document.getElementById("btnImprimir").onclick = ()=> window.print();
document.getElementById("btnRegresar").onclick = ()=> location.href="reportes.html";

// inicio
window.addEventListener("DOMContentLoaded", async ()=>{
  actualizarInfo();
  setInterval(actualizarInfo,1000);

  document.getElementById("fecha").value = fechaHoy();

  await cargarUsuarios();
  await cargarLoterias();
});
</script>

</body>
</html>
