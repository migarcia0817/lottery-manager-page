<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asignar Límite por Grupo</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; background:#f9f9f9; }
.topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; padding:10px 20px; flex-wrap:wrap; }
.user-info { background:#e0d4ff; padding:5px 20px; text-align:right; }
.titulo { width:95%; margin:20px auto; background:#512BD4; color:white; padding:10px; text-align:center; border-radius:5px; font-weight:bold; }
.filtros { width:95%; margin:10px auto; display:flex; gap:10px; flex-wrap:wrap; }
.filtros select, .filtros input, .filtros button { padding:10px; border-radius:5px; border:1px solid #ccc; flex:1 1 150px; min-width:120px; }
.filtros button { background:#28a745; color:white; cursor:pointer; }
#grupoContainer { width:95%; margin:10px auto; background:#f1f1f1; padding:10px; border-radius:5px; min-height:40px; display:flex; flex-wrap:wrap; gap:5px; }
.usuarioItem { background:#512BD4; color:white; padding:5px 10px; border-radius:5px; display:flex; align-items:center; gap:5px; }
.usuarioItem button { background:#dc3545; border:none; padding:2px 6px; border-radius:3px; cursor:pointer; color:white; }
#tablaGrupos { width:95%; margin:20px auto; background:white; padding:15px; border-radius:5px; overflow-x:auto; }
#tablaGrupos h2 { text-align:center; color:#512BD4; margin-bottom:5px; }
#tablaHeader { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
#tablaHeader button { padding:5px 10px; border:none; border-radius:5px; background:#512BD4; color:white; cursor:pointer; }
#tablaHeader span { font-weight:bold; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
th { background:#512BD4; color:white; }
button.btn-eliminar { background:#dc3545; color:white; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; margin-right:3px; }
.status { margin-top:10px; color:green; font-weight:bold; text-align:center; }
/* Responsive */
@media(max-width:768px){
  .filtros { flex-direction: column; }
  .filtros select, .filtros input, .filtros button { flex:1; width:100%; }
  #grupoContainer { flex-direction: column; }
  #tablaHeader { flex-direction: column; gap:5px; }
  #tablaHeader button { width:100%; }
}
</style>
</head>

<body>
<div class="topbar"><span style="font-size:18px; font-weight: bold;">Lottery - Asignar por Grupo</span></div>
<div class="user-info" id="userInfo"></div>
<div class="titulo">Asignar Límite Compartido a Grupo</div>

<div id="grupoForm">
  <h2 style="margin-left: 25px;">Formulario de Grupo</h2>
  <div class="filtros">
    <select id="comboUsuario"><option value="">Cargando usuarios...</option></select>
    <button type="button" id="agregarUsuarioBtn">Agregar al Grupo</button>
    <select id="tipoJugada">
      <option value="Qui">Quiniela</option>
      <option value="Pale">Pale</option>
      <option value="Trip">Tripleta</option>
      <option value="Sp">SuperPale</option>
    </select>
    <input type="text" id="numero" placeholder="Número (opcional)">
    <input type="number" id="limite" placeholder="Límite total" min="1">
    <label>
      Bloqueado
      <input type="checkbox" id="bloqueado">
    </label>
    <button type="button" id="asignarGrupoBtn">Asignar al Grupo</button>
  </div>

  <div id="grupoContainer"></div>
  <div class="status" id="status"></div>
</div>

<div id="tablaGrupos">
  <div id="tablaHeader">
    <span id="grupoLabel">Grupo: </span>
    <button style="width:15% ;height: 35px; font-weight:bold ;" onclick="window.location.href='editarlimite.html'">Regresar</button>
  </div>
  <h2>Grupos con Límite Compartido</h2>
  <table>
    <thead>
      <tr>
        <th>Usuarios</th>
        <th>Tipo Jugada</th>
        <th>Número</th>
        <th>Límite Restante</th>
        <th>Bloqueado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbodyGrupos"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  window.location.href = "login.html";
}

["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});
resetTimer();

/* 🔹 Usuario logueado */
const userData = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = userData ? userData.nombre : "Invitado";
const tipoUsuarioLogueado = userData ? userData.tipo : "";

// Usamos Date directamente para evitar errores si hoyLocal() no ha cargado
const fechaHoy = new Date().toISOString().split('T')[0]; 

document.getElementById("userInfo").innerHTML = "Usuario: " + usuarioLogueado + " | Fecha: " + fechaHoy;
document.getElementById("grupoLabel").textContent = "Grupo: " + usuarioLogueado;


/* 🔹 Campos y contenedores */
const comboUsuario = document.getElementById("comboUsuario");
const tipoJugadaSelect = document.getElementById("tipoJugada");
const numeroInput = document.getElementById("numero");
const limiteInput = document.getElementById("limite");
const bloqueadoInput = document.getElementById("bloqueado");
const grupoContainer = document.getElementById("grupoContainer");
const statusDiv = document.getElementById("status");

let usuariosGrupo = [];
let usuariosIdMap = {}; // 🔹 almacenar ID de Firebase

/* 🔹 Cargar usuarios */
document.getElementById("agregarUsuarioBtn").addEventListener("click", ()=>{
  const seleccion = comboUsuario.value;
  
  if(!seleccion) return;

  if(seleccion === "TODOS_VISIBLES"){
    // Recorremos el combo para agregar a todos los que NO estén ya en la lista
    for (let i = 0; i < comboUsuario.options.length; i++) {
      const id = comboUsuario.options[i].value;
      // Saltamos las opciones vacías o de mando
      if(id !== "" && id !== "TODOS_VISIBLES"){
        if(!usuariosGrupo.includes(id)){
          usuariosGrupo.push(id);
        }
      }
    }
    renderUsuariosGrupo();
  } else {
    // Agregar uno por uno normalmente
    if(usuariosGrupo.includes(seleccion)){ alert("Usuario ya agregado"); return; }
    usuariosGrupo.push(seleccion);
    renderUsuariosGrupo();
  }
});

cargarUsuarios();

/* 🔹 Agregar usuario al grupo */
/* 🔹 Agregar usuario al grupo (Individual o Masivo) */
document.getElementById("agregarUsuarioBtn").addEventListener("click", () => {
  const seleccion = comboUsuario.value;

  if (!seleccion) return;

  // 🔥 Lógica para agregar TODOS
  if (seleccion === "TODOS_VISIBLES") {
    let seAgregoAlguien = false;
    for (let i = 0; i < comboUsuario.options.length; i++) {
      const id = comboUsuario.options[i].value;
      
      // Filtramos para no agregar el valor vacío ni la propia opción "TODOS"
      if (id !== "" && id !== "TODOS_VISIBLES") {
        if (!usuariosGrupo.includes(id)) {
          usuariosGrupo.push(id);
          seAgregoAlguien = true;
        }
      }
    }
    if (seAgregoAlguien) renderUsuariosGrupo();
  } 
  // Lógica normal para UN SOLO usuario
  else {
    if (usuariosGrupo.includes(seleccion)) {
      alert("Usuario ya agregado");
      return;
    }
    usuariosGrupo.push(seleccion);
    renderUsuariosGrupo();
  }
});

/* 🔹 Renderizar los elementos en el contenedor */
function renderUsuariosGrupo() {
  grupoContainer.innerHTML = '';
  usuariosGrupo.forEach((id, index) => {
    const nombre = usuariosIdMap[id] || id;
    const div = document.createElement('div');
    div.className = 'usuarioItem';
    div.textContent = nombre;

    const btn = document.createElement('button');
    btn.textContent = 'x';
    btn.onclick = () => {
      usuariosGrupo.splice(index, 1);
      renderUsuariosGrupo();
    };

    div.appendChild(btn);
    grupoContainer.appendChild(div);
  });
}

/* 🔹 Validación de número */
function validarNumero(numero, tipo){
  if(!numero) return true;
  switch(tipo){
    case "Qui": return /^\d{2}$/.test(numero);
    case "Pale": return /^\d{2}-\d{2}$/.test(numero);
    case "Trip": return /^\d{2}-\d{2}-\d{2}$/.test(numero);
    case "Sp": return /^\d{2}-\d{2}$/.test(numero);
    default: return false;
  }
}

tipoJugadaSelect.addEventListener("change", ()=>{ numeroInput.value=""; });

numeroInput.addEventListener("input", (e)=>{
  const tipo = tipoJugadaSelect.value;
  let val = e.target.value.replace(/[^\d-]/g,'');
  if(tipo==="Qui" && val.length>2) val=val.slice(0,2);
  if(tipo==="Pale" && val.length>5) val=val.slice(0,5);
  if(tipo==="Trip" && val.length>8) val=val.slice(0,8);
  if(tipo==="Sp" && val.length>5) val=val.slice(0,5);
  e.target.value = val;
});

/* 🔹 Asignar límite al grupo */
document.getElementById("asignarGrupoBtn").addEventListener("click", async ()=>{
  const tipoJugada = tipoJugadaSelect.value;
  const numero = numeroInput.value.trim() || null;
  let limite = parseFloat(limiteInput.value);
  const bloqueado = bloqueadoInput.checked;

  if(usuariosGrupo.length===0){ alert("Agregue al menos un usuario al grupo"); return; }
  if(!validarNumero(numero, tipoJugada)){ alert("Número no cumple el formato"); return; }
  if(isNaN(limite) || limite<=0) limite = 100;

  const groupKey = `GRUPO_${Date.now()}`;
  const data = {
    Key: groupKey,
    Usuarios: usuariosGrupo,
    TipoJugada: tipoJugada,
    Numero: numero,
    LimiteRestante: limite,
    Bloqueado: bloqueado
  };

  try{
    await set(ref(db,'GruposVentas/'+groupKey), data);
    statusDiv.textContent = `Límite asignado al grupo (${usuariosGrupo.length} usuarios)`;
    statusDiv.style.color='green';
    usuariosGrupo = [];
    renderUsuariosGrupo();
    numeroInput.value=""; limiteInput.value=""; bloqueadoInput.checked=false;
    cargarTablaGrupo();
  }catch(e){ console.error(e); statusDiv.textContent='Error al asignar grupo'; statusDiv.style.color='red'; }
});

/* 🔹 Cargar tabla de grupos */
async function cargarTablaGrupo(){
  const tbody = document.getElementById("tbodyGrupos");
  tbody.innerHTML = "<tr><td colspan='6'>Cargando...</td></tr>";
  const snap = await get(child(ref(db),"GruposVentas"));
  const data = snap.val() || {};
  tbody.innerHTML = "";

  const tipoMap = { "Qui":"Quiniela", "Pale":"Pale", "Trip":"Tripleta", "Sp":"SuperPale" };

  for(const key in data){
    const grupo = data[key];
    const nombres = grupo.Usuarios.map(id=>usuariosIdMap[id] || id);
    tbody.innerHTML += `<tr>
      <td>${nombres.join(', ')}</td>
      <td>${tipoMap[grupo.TipoJugada]}</td>
      <td>${grupo.Numero||'-'}</td>
      <td>${grupo.LimiteRestante}</td>
      <td>${grupo.Bloqueado?'Sí':'No'}</td>
      <td><button class="btn-eliminar" onclick="eliminarGrupo('${grupo.Key}')">Eliminar</button></td>
    </tr>`;
  }

  if(tbody.innerHTML==="") tbody.innerHTML="<tr><td colspan='6'>No hay grupos asignados</td></tr>";
}

/* 🔹 Eliminar grupo */
window.eliminarGrupo = async function(key){
  if(!confirm("¿Seguro que quieres eliminar este grupo?")) return;
  try{
    await remove(ref(db,'GruposVentas/'+key));
    cargarTablaGrupo();
  }catch(e){ console.error(e); alert("Error al eliminar el grupo"); }
}

/* 🔹 Inicializar */
window.onload = ()=>{
  cargarTablaGrupo();
};
</script>
</body>
</html>
