<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LOTTERY SYSTEMS - Monitor</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
  .topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px 20px; }
  .logo-section { display:flex; align-items:center; }
  .logo-section img { height:40px; margin-right:10px; }
  .logo-section span { font-size:20px; font-weight:bold; }
  .menu-right button { background:#fff; color:#512BD4; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight:bold; }
  .menu-right button:hover { background:#ddd; }

  .user-info { width:100%; background:#e0d4ff; display:flex; justify-content:flex-end; padding:5px 20px; font-size:14px; color:#333; }

  .monitor-bar { width:93.5%; margin:10px auto 0; background:#512BD4; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px; flex-wrap:wrap; }
  .date-picker { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

  .monitor-buttons { display:flex; gap:10px; margin-top:5px; }
  .monitor-buttons button { background:#fff; color:#512BD4; border:none; padding:6px 12px; border-radius:5px; cursor:pointer; font-weight:bold; }
  .monitor-buttons button:hover { background:#ddd; }

  .barra-totales {
    width:93%;
    margin:10px auto 0;
    background:#eee;
    padding:10px;
    font-weight:bold;
    border-radius:5px;
    text-align:center;
  }

  /* 🔹 LABEL GRUPO */
  .label-grupo {
    width:95%;
    margin:10px auto 0;
    font-size:16px;
    font-weight:bold;
  }

  .tabla-container {
    width:95%;
    margin:10px auto;
    height:calc(100vh - 380px);
    overflow-y:auto;
    background:white;
    border-radius:5px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
  }

  table { width:100%; border-collapse:collapse; }
  th, td { border:1px solid #ccc; padding:10px; text-align:center; }
  th { background:#512BD4; color:white; position:sticky; top:0; }

  .total-row { background:#eee; font-weight:bold; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-section">
    <img src="lote.png" alt="Logo">
    <span>Lottery</span>
  </div>
  <div class="menu-right">
    <button onclick="cerrarSesion()">Cerrar Sesión</button>
  </div>
</div>

<div class="user-info" id="userInfo">Usuario: -- | Fecha/Hora: --</div>

<div class="monitor-bar">
  <h2>Resumen de Ventas</h2>

  <div class="date-picker">
    <label>Desde: <input type="date" id="fechaDesde"></label>
    <label>Hasta: <input type="date" id="fechaHasta"></label>
    <button id="btnBuscar">Buscar</button>
  </div>

  <div class="monitor-buttons">
    <button id="btnResumenVentas">Resumen Venta</button>
    <button id="btnMasVendidoDisp">Más Vendido</button>
    <button id="btneditarcomision">Editar Comision</button>
    <button id="btnregresar">Regresar</button>
  </div>
</div>

<!-- 🔹 BARRA TOTAL -->
<div id="barraTotales" class="barra-totales">
  Total Ventas: 0.00 | Total Premios: 0.00 | Balance: 0.00
</div>

<!-- 🔹 LABEL GRUPO -->
<div id="labelGrupo" class="label-grupo">
  Grupo: --
</div>

<div class="tabla-container">
  <table id="tablaMonitor">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Total Ventas</th>
        <th>Total Premios</th>
        <th>% Comisión</th>
        <th>Monto Comisión</th>
        <th>Balance</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- ================= MODAL COMISIÓN ================= -->
<div id="modalComision" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
  <div style="background:white; padding:20px; border-radius:10px; width:300px; position:relative;">

    <span onclick="cerrarModal()" style="position:absolute; right:10px; top:10px; cursor:pointer;">X</span>

    <h3>Editar Comisión (%)</h3>

    <select id="comboUsuarios" style="width:100%; margin-bottom:10px; border-radius:5px"></select>

    <label id="lblComisionActual">Comisión actual: 0%</label>

    <input type="number" id="txtComision" placeholder="Ej: 15" style="width:97%; margin:10px 0; border-radius:5px;">

    <button onclick="guardarComision()" style="width:100%; border-radius:5px; background:#1E4A0B;color:#fff ;">Actualizar</button>


  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import { 
  getDatabase, 
  ref, 
  get, 
  child, 
  set 
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";


const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

//control de cerrar solo 
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  window.location.href = "login.html";
}

["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

  const userData = JSON.parse(localStorage.getItem("usuarioLogueado"));

// 🔥 BLOQUEO TOTAL SI NO HAY SESIÓN
if(!userData){
  window.location.href = "login.html";
}

// ✅ ya seguro existe
const usuarioLogueado = userData.nombre;

const usuarioGuardado = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = usuarioGuardado ? usuarioGuardado.nombre : "Invitado";
const usuarioAsignado = usuarioGuardado ? usuarioGuardado.nombre : null;
const tipoUsuario = usuarioGuardado ? usuarioGuardado.tipo : null; // aseguramos tipoUsuario

// 🔹 FUNCIONES SEGURAS
function getFecha(v){ return v.fechaCreacion || v.FechaCreacion || ""; }
function getUsuarioId(v){ return v.usuarioId || v.UsuarioId || ""; }
function getTotal(v){ return v.totalNeto || v.TotalNeto || 0; }
function getPremio(v){ return v.premioCalculado || v.PremioCalculado || 0; }
function esGanador(v){ return v.esGanador || v.EsGanador || false; }

function actualizarUserInfo(){
  const now = new Date();
  document.getElementById("userInfo").innerHTML =
    `Usuario: ${usuarioLogueado} | Fecha/Hora: ${now.toLocaleString()}`;
}

function hoyLocal(){
  const fecha = new Date();
  const yyyy = fecha.getFullYear();
  const mm = String(fecha.getMonth() + 1).padStart(2, '0');
  const dd = String(fecha.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

window.cerrarSesion = () => {
  alert("Sesión cerrada");
  window.location.href="index.html";
};

async function cargarMonitor(){
  const desde = document.getElementById("fechaDesde").value;
  const hasta = document.getElementById("fechaHasta").value;

  if(!desde || !hasta) return alert("Selecciona un rango de fechas.");

  const tbody = document.querySelector("#tablaMonitor tbody");
  tbody.innerHTML = "<tr><td colspan='4'>Cargando...</td></tr>";

  const usuariosSnap = await get(child(ref(db), "Usuarios"));
  const usuariosData = usuariosSnap.val() || {};

  const resumen = {};



  for(const uid in usuariosData){
    const u = usuariosData[uid];

    // 👑 ADMINISTRADOR VE TODO
    if(tipoUsuario === "Administrador"){
      resumen[String(u.Id)] = { nombre: u.NombreUsuario || "Sin nombre", ventas:0, premios:0 };
    }
    // 👤 ADM VE SOLO LOS SUYOS
    else if(tipoUsuario === "ADM" &&
           (u.Asignado === usuarioAsignado || u.NombreUsuario === usuarioLogueado)){
      resumen[String(u.Id)] = { nombre: u.NombreUsuario || "Sin nombre", ventas:0, premios:0 };
    }
  }

  const ventasSnap = await get(child(ref(db), "ventas"));
  const ventasData = ventasSnap.val() || {};

  for(const clave in ventasData){
    const v = ventasData[clave];
    const fechaRaw = getFecha(v);
    if(!fechaRaw) continue;

    const fecha = fechaRaw.split("T")[0];
    if(fecha >= desde && fecha <= hasta){
      const uid = String(getUsuarioId(v));
      if(resumen[uid]){
        resumen[uid].ventas += Number(getTotal(v)) || 0;
        if(esGanador(v)){
          resumen[uid].premios += Number(getPremio(v)) || 0;
        }
      }
    }
  }

 //cargando la comisio desde forebase
const comisionesPorUsuario = {};

// cargar comisiones
const comisionesSnap = await get(child(ref(db), "Comisiones"));
const comisionesData = comisionesSnap.val() || {};

// guardar por nombre de usuario
for (const key in comisionesData) {
  const cleanKey = String(key).trim().toLowerCase();
  comisionesPorUsuario[cleanKey] = Number(comisionesData[key].porcentaje) || 0;
}

tbody.innerHTML = "";

let totalVentas = 0;
let totalPremios = 0;
let totalComision = 0;

for (const uid in resumen) {

  const { nombre, ventas, premios } = resumen[uid];

  // 🔥 USAR NOMBRE USUARIO (NO UID)
  const cleanNombre = String(nombre).trim().toLowerCase();

  const porcentaje = comisionesPorUsuario[cleanNombre] ?? 0;

  const montoComision = Number(ventas) * (porcentaje / 100);
  const balance = Number(ventas) - Number(premios) - montoComision;

  totalVentas += Number(ventas);
  totalPremios += Number(premios);
  totalComision += montoComision;

  tbody.innerHTML += `
    <tr>
      <td>${nombre}</td>
      <td>${Number(ventas).toFixed(2)}</td>
      <td>${Number(premios).toFixed(2)}</td>
      <td>${porcentaje}%</td>
      <td>${montoComision.toFixed(2)}</td>
      <td style="color:${balance >= 0 ? 'green' : 'red'};">
        ${balance.toFixed(2)}
      </td>
    </tr>
  `;
}

  const balanceGeneral = totalVentas - totalPremios - totalComision;

document.getElementById("barraTotales").innerHTML = `
  <div style="display:flex; justify-content:space-between;">
    <div>Total Ventas: ${totalVentas.toFixed(2)}</div>
    <div>Total Premios: ${totalPremios.toFixed(2)}</div>
    <div>Total Comisión: ${totalComision.toFixed(2)}</div>
    <div style="color:${balanceGeneral >= 0 ? 'green' : 'red'};">
      Balance: ${balanceGeneral.toFixed(2)}
    </div>
  </div>
`;
  tbody.innerHTML += `
  <tr>
    <td>${nombre}</td>
    <td>${ventas.toFixed(2)}</td>
    <td>${premios.toFixed(2)}</td>
    <td style="color:${balance>=0?'green':'red'}; font-weight:bold;">
      ${balance.toFixed(2)}
    </td>
  </tr>`;
}

// EVENTOS
document.getElementById("btnBuscar").addEventListener("click", cargarMonitor);
document.getElementById("btnMasVendidoDisp").addEventListener("click", () => {
  window.location.href = "masvendido.html";
});
document.getElementById("btnregresar").addEventListener("click", () => {
  window.location.href = "principal.html";
});

window.onload = () => {
  actualizarUserInfo();
  setInterval(actualizarUserInfo,1000);

  document.getElementById("labelGrupo").innerHTML = `Grupo: ${usuarioLogueado}`;

  const hoy = hoyLocal();
  document.getElementById("fechaDesde").value = hoy;
  document.getElementById("fechaHasta").value = hoy;

  cargarMonitor();

  // ================= MODAL COMISIÓN =================

document.getElementById("btneditarcomision").addEventListener("click", () => {
  document.getElementById("modalComision").style.display = "flex";
  cargarUsuariosComision();
});

window.cerrarModal = () => {
  document.getElementById("modalComision").style.display = "none";
};

async function cargarUsuariosComision() {
  const combo = document.getElementById("comboUsuarios");
  combo.innerHTML = "";

  const snap = await get(child(ref(db), "Usuarios"));
  const data = snap.val() || {};

  for (const uid in data) {
    const u = data[uid];
    combo.innerHTML += `<option value="${uid}">${u.NombreUsuario}</option>`;
  }

  if (combo.value) cargarComision(combo.value);
}

document.getElementById("comboUsuarios").addEventListener("change", (e) => {
  cargarComision(e.target.value);
});

async function cargarComision(uid) {
  const snap = await get(child(ref(db), "Comisiones/" + uid));
  const p = snap.val()?.porcentaje || 0;

  document.getElementById("lblComisionActual").innerText =
    "Comisión actual: " + p + "%";

  document.getElementById("txtComision").value = p;
}

window.guardarComision = async () => {

  const uid = document.getElementById("comboUsuarios").value;
  const p = parseFloat(document.getElementById("txtComision").value);

  // 🔥 validaciones
  if (!uid) return alert("Selecciona un usuario");
  if (isNaN(p)) return alert("Valor inválido");

  // 🔥 guardar en Firebase
  await set(ref(db, "Comisiones/" + uid), {
    porcentaje: Number(p)
  });

  alert("Comisión guardada correctamente");

  // 🔥 opcional: refrescar tabla
  cargarMonitor();
};
  cerrarModal();
  cargarMonitor();

};
</script>
</body>
</html>
