<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba Resumen PRO FIX</title>

<style>
body { margin:0; font-family: Arial; background:#f4f4f4; }

/* TOP */
.topbar {
  background:#512BD4;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
}

.hamburger { font-size:26px; cursor:pointer; }

.menu-dropdown {
  position:absolute;
  top:60px;
  right:20px;
  background:white;
  display:none;
  flex-direction:column;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.menu-dropdown button {
  padding:10px;
  border:none;
  background:white;
  cursor:pointer;
}

/* USER */
.user-info {
  background:#e0e0e0;
  padding:8px 20px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* RESUMEN */
.resumen-bar {
  width:95%;
  margin:15px auto;
  background:white;
  padding:10px;
  font-weight:bold;
  border-radius:6px;
}

/* BOTONES */
.btn {
  padding:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.btn-buscar { background:#28a745; color:white; }
.btn-imprimir { background:#ff7f00; color:white; }
.btn-back { background:#6c757d; color:white; }

/* TABLAS */
.tabla-container { width:95%; margin:auto; }

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-top:15px;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

th { background:#512BD4; color:white; }

h3 { text-align:center; margin-top:20px; }
</style>
</head>

<body>

<div class="topbar">
  <div>Lottery</div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<div id="menu" class="menu-dropdown">
  <button onclick="location.href='principal.html'">Principal</button>
  <button onclick="location.href='tickets.html'">Tickets</button>
  <button onclick="logout()">Salir</button>
</div>

<!-- USER BAR -->
<div class="user-info">
  <div id="userTxt"></div>
  <div id="timeTxt"></div>
</div>

<!-- RESUMEN -->
<div class="resumen-bar">
  Fecha: <span id="rFecha">--</span> |
  Lotería: <span id="rLoteria">--</span> |
  Total: RD$ <span id="rTotal">0</span>
</div>

<!-- FILTROS -->
<div style="width:95%;margin:auto;display:flex;gap:10px;flex-wrap:wrap;">
  <select id="comboUsuario"></select>
  <input type="date" id="fecha">
  <select id="comboLoteria"></select>

  <button class="btn btn-buscar" id="btnBuscar">Buscar</button>
  <button class="btn btn-imprimir" onclick="window.print()">Imprimir</button>
  <button class="btn btn-back" onclick="history.back()">Regresar</button>
</div>

<div class="tabla-container">

<h3>QUINIELA</h3>
<table>
<thead><tr><th>Número</th><th>Total</th></tr></thead>
<tbody id="tQuiniela"></tbody>
</table>

<h3>PALES</h3>
<table>
<thead><tr><th>Número</th><th>Total</th></tr></thead>
<tbody id="tPale"></tbody>
</table>

<h3>TRIPLETAS</h3>
<table>
<thead><tr><th>Número</th><th>Total</th></tr></thead>
<tbody id="tTripleta"></tbody>
</table>

<h3>SUPER PALE</h3>
<table>
<thead><tr><th>Número</th><th>Total</th></tr></thead>
<tbody id="tSuper"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

/* USER */
const user = JSON.parse(localStorage.getItem("usuarioLogueado") || "{}");

document.getElementById("userTxt").innerText =
  "Usuario: " + (user.nombre || "Invitado");

/* HORA */
function hora(){
  return new Date().toLocaleTimeString();
}
setInterval(()=>{
  document.getElementById("timeTxt").innerText = hora();
},1000);

/* MENU */
window.toggleMenu = ()=>{
  const m = document.getElementById("menu");
  m.style.display = m.style.display==="flex"?"none":"flex";
};

window.logout = ()=>{
  localStorage.removeItem("usuarioLogueado");
  location.href="login.html";
};

/* DATA */
let quiniela={}, pale={}, tripleta={}, superp={};

/* RESET FUNCION CLAVE */
function resetData(){
  quiniela = {};
  pale = {};
  tripleta = {};
  superp = {};

  for(let i=0;i<100;i++){
    quiniela[i.toString().padStart(2,'0')] = 0;
  }
}

/* USERS */
async function loadUsers(){
  const snap = await get(child(ref(db),"Usuarios"));
  const data = snap.val() || {};

  const combo = document.getElementById("comboUsuario");
  combo.innerHTML = `<option value="TODOS">TODOS</option>`;

  for(const id in data){
    const u = data[id];

    if((user.tipo||"") === "Administrador"){
      combo.innerHTML += `<option value="${u.NombreUsuario}">${u.NombreUsuario}</option>`;
    } else {
      if(u.Asignado === (user.asignado||user.nombre)){
        combo.innerHTML += `<option value="${u.NombreUsuario}">${u.NombreUsuario}</option>`;
      }
    }
  }
}

/* LOTERIAS */
async function loadLoterias(){
  const snap = await get(child(ref(db),"TodasLasLoterias"));
  const data = snap.val() || {};

  const combo = document.getElementById("comboLoteria");
  combo.innerHTML = `<option value="">Todas</option>`;

  Object.values(data).forEach(l=>{
    combo.innerHTML += `<option value="${l.KeyLoteria}">${l.LoteriaNombre}</option>`;
  });
}

/* BUSCAR */
document.getElementById("btnBuscar").onclick = async ()=>{

  resetData(); // 🔥 FIX PRINCIPAL

  const usuario = document.getElementById("comboUsuario").value;
  const fecha = document.getElementById("fecha").value;
  const loteria = document.getElementById("comboLoteria").value;

  const snap = await get(child(ref(db),"ventas"));
  const data = snap.val() || {};

  let total = 0;

  for(const id in data){
    const v = data[id];

    const userDB = String(v.nombreUsuario || "").trim();

    if(usuario !== "TODOS" && userDB !== usuario) continue;

    const f = (v.fechaCreacion || "").substring(0,10);
    if(fecha && f !== fecha) continue;

    if(loteria && v.loteriasAsociadasClave !== loteria) continue;

    (v.quinielas||[]).forEach(q=>{
      quiniela[q.numeros] = (quiniela[q.numeros]||0)+q.monto;
      total += q.monto;
    });

    (v.pales||[]).forEach(p=>{
      pale[p.numeros] = (pale[p.numeros]||0)+p.monto;
      total += p.monto;
    });

    (v.tripletas||[]).forEach(t=>{
      tripleta[t.numeros] = (tripleta[t.numeros]||0)+t.monto;
      total += t.monto;
    });

    (v.superPales||[]).forEach(s=>{
      superp[s.numeros] = (superp[s.numeros]||0)+s.monto;
      total += s.monto;
    });
  }

  document.getElementById("rFecha").innerText = fecha || new Date().toLocaleDateString();
  document.getElementById("rLoteria").innerText = loteria || "Todas";
  document.getElementById("rTotal").innerText = total.toFixed(2);

  function render(id,obj){
    const t = document.getElementById(id);
    t.innerHTML="";
    Object.keys(obj).sort().forEach(k=>{
      t.innerHTML += `<tr><td>${k}</td><td>${obj[k].toFixed(2)}</td></tr>`;
    });
  }

  render("tQuiniela",quiniela);
  render("tPale",pale);
  render("tTripleta",tripleta);
  render("tSuper",superp);
};

/* INIT */
window.onload = ()=>{
  loadUsers();
  loadLoterias();
};
</script>

</body>
</html>
