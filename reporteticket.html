<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte de Tickets</title>

<script src="seguridad.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
.topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px 20px; position:relative; }
.hamburger { font-size:26px; cursor:pointer; user-select:none; }
.menu-dropdown { position:absolute; top:60px; right:20px; background:white; display:none; flex-direction:column; box-shadow:0 0 10px rgba(0,0,0,0.2); z-index:999; }
.menu-dropdown button { padding:10px; border:none; background:white; cursor:pointer; text-align:left; }
.menu-dropdown button:hover { background:#f2f2f2; }

.user-info { background:#e0d4ff; padding:5px 20px; text-align:right; font-size:14px; }
.titulo-bar { width:95%; margin:20px auto; background:#512BD4; color:white; padding:10px; text-align:center; font-size:18px; border-radius:5px; }

.filtros { width:95%; margin:10px auto; display:flex; flex-wrap:wrap; gap:10px; }
.filtros input, .filtros select, .filtros button { padding:10px; border-radius:5px; border:1px solid #ccc; font-size:14px; }
.filtros button { cursor:pointer; color:white; font-weight:bold; border:none; }
#btnBuscar { background:#28a745; }
#btnImprimir { background:#ff7f00; }
#btnRegresar { background:#6c757d; }

.total-general { width:95%; margin:10px auto; font-weight:bold; font-size:16px; text-align:right; }
.tabla-container { width:95%; margin:auto; overflow-x:auto; }
table { width:100%; border-collapse:collapse; background:white; margin-bottom:20px; min-width:600px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
th { background:#512BD4; color:white; position:sticky; top:0; }

<style>
.topbar {
  background:#512BD4;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
}

.logo-section {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-section img {
  height:40px;
  width:40px;
  object-fit:contain;
}

.logo-section span {
  font-size:18px;
  font-weight:bold;
  line-height:40px;
}
</style>
</style>
</head>
<body>



<div class="topbar">
  <div class="logo-section">
    <img src="lote.png" alt="logo">
    <span>Lottery</span>
  </div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<div id="menuDropdown" class="menu-dropdown">
  <button onclick="location.href='principal.html'">Principal</button>
  <button onclick="location.href='tickets.html'">Tickets</button>
  <button onclick="logout()">Cerrar Sesión</button>
</div>

<div class="user-info" id="userInfo"></div>
<div class="titulo-bar">Reporte de Tickets</div>

<div class="filtros">
  <select id="comboUsuario"></select>
  <input type="date" id="fechaDesde">
  <input type="date" id="fechaHasta">
  <button id="btnBuscar">Buscar</button>
  <button id="btnImprimir">Imprimir</button>
  <button id="btnRegresar">Regresar</button>
</div>

<!-- Totales de tickets -->
<div class="total-general" id="totalGeneral">Total Tickets: 0 | Total Monto: RD$ 0.00</div>

<div class="tabla-container">
  <table>
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Banca</th>
        <th>Fecha</th>
        <th>Número Ticket</th>
        <th>Total Ticket</th>
        <th>Lotería</th>
      </tr>
    </thead>
    <tbody id="tablaTickets"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

//contro de cerrar solo 
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  window.location.href = "login.html";
}

["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

// menú
window.toggleMenu = () => {
  const m = document.getElementById("menuDropdown");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
};
window.logout = () => {
  localStorage.removeItem("usuarioLogueado");
  location.href="index.html";
};

// info usuario
const userData = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = userData?.nombre || "Invitado";
function actualizarInfo(){
  document.getElementById("userInfo").innerText =
    "Usuario: " + usuarioLogueado + " | " + new Date().toLocaleString();
}
window.addEventListener("DOMContentLoaded", actualizarInfo);
setInterval(actualizarInfo, 1000);

// fecha hoy
function fechaHoy(){ return new Date().toISOString().split("T")[0]; }

// cargar usuarios
// cargar usuarios con filtro de rol
async function cargarUsuarios(){
  const combo = document.getElementById("comboUsuario");
  combo.innerHTML = "<option value=''>Todos los Usuarios</option>";

  // Obtenemos datos de sesión
  const supervisorID = userData?.id || userData?.uid || userData?.Id;
  const tipo = userData?.tipo || "";

  const snap = await get(child(ref(db),"Usuarios"));
  const data = snap.val() || {};

  // Si es Supervisor, buscamos sus miembros primero
  let usuariosPermitidos = [];
  if (tipo === "Supervisor") {
    const gruposSnap = await get(child(ref(db), "Grupos"));
    const gruposData = gruposSnap.val() || {};
    for (const gId in gruposData) {
      if (String(gruposData[gId].supervisor) === String(supervisorID)) {
        usuariosPermitidos = gruposData[gId].usuarios || [];
        break;
      }
    }
  }

  for(const id in data){
    const u = data[id];
    const nombreU = u.NombreUsuario;
    const idU = String(u.Id);
    let mostrar = false;

    if (tipo === "Administrador") {
      mostrar = true;
    } else if (tipo === "ADM" && u.Asignado === usuarioLogueado) {
      mostrar = true;
    } else if (tipo === "Supervisor" && usuariosPermitidos.includes(idU)) {
      mostrar = true;
    }

    if(mostrar){
      combo.innerHTML += `<option value="${nombreU}">${nombreU}</option>`;
    }
  }
}

// buscar tickets con filtro de seguridad
async function buscarTickets(){
  const desde = document.getElementById("fechaDesde").value;
  const hasta = document.getElementById("fechaHasta").value;
  const usuarioSel = document.getElementById("comboUsuario").value;
  const tabla = document.getElementById("tablaTickets");
  const totalGeneralDiv = document.getElementById("totalGeneral");

  // Lista de usuarios permitidos según el combo
  const permitidos = Array.from(document.querySelectorAll("#comboUsuario option"))
    .map(o => o.value)
    .filter(v => v !== "");

  if(!desde || !hasta){ alert("Seleccione fechas"); return; }

  tabla.innerHTML = "<tr><td colspan='6'>Cargando...</td></tr>";
  totalGeneralDiv.innerText = "Total Tickets: 0 | Total Monto: RD$ 0.00";

  const snap = await get(child(ref(db),"ventas"));
  const data = snap.val() || {};
  tabla.innerHTML = "";
  let encontrados = false;
  let totalMonto = 0;
  let totalTickets = 0;
  const tipo = userData?.tipo || "";

  for(const id in data){
    const v = data[id];
    const fechaTicket = v.fechaCreacion ? v.fechaCreacion.substring(0,10) : "N/A";
    const usuarioTicket = v.nombreUsuario || "";

    // Filtros de fecha
    if(fechaTicket < desde || fechaTicket > hasta) continue;
    
    // 🔥 FILTRO DE SEGURIDAD PARA ROLES
    if (tipo !== "Administrador" && !permitidos.includes(usuarioTicket)) continue;
    
    // Filtro de selección manual
    if(usuarioSel && usuarioTicket !== usuarioSel) continue;

    encontrados = true;
    totalTickets++;
    const usuarioId = v.usuarioId !== undefined ? v.usuarioId : "N/A";
    const banca = v.nombreUsuario || "N/A";
    const numeroTicket = v.numeroTicket || "N/A";
    const totalTicket = v.totalNeto !== undefined ? Number(v.totalNeto) : calcularTotalTicket(v);
    totalMonto += totalTicket;
    const loteria = v.loteriasNormales || v.loteriasAsociadasClave || v.LoteriasSuperPale || "N/A";

    tabla.innerHTML += `<tr>
      <td>${banca}</td>
      <td>${usuarioId}</td>
      <td>${fechaTicket}</td>
      <td>${numeroTicket}</td>
      <td>${Number(totalTicket).toFixed(2)}</td>
      <td>${loteria}</td>
    </tr>`;
  }

  totalGeneralDiv.innerText = `Total Tickets: ${totalTickets} | Total Monto: RD$ ${totalMonto.toFixed(2)}`;

  if(!encontrados){
    tabla.innerHTML = "<tr><td colspan='6'>No se encontraron tickets en este rango.</td></tr>";
  }
}


// botones
document.getElementById("btnBuscar").onclick = buscarTickets;
document.getElementById("btnImprimir").onclick = ()=> window.print();
document.getElementById("btnRegresar").onclick = ()=> location.href="reportes.html";

// inicio
window.addEventListener("DOMContentLoaded", async ()=>{
  document.getElementById("fechaDesde").value = fechaHoy();
  document.getElementById("fechaHasta").value = fechaHoy();
  await cargarUsuarios();
  await buscarTickets();
});
</script>

</body>
</html>
