<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LOTTERY SYSTEMS - Reportes</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }

/* 🔵 TOPBAR */
.topbar {
  background:#512BD4;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  position:relative;
}

.logo-section { display:flex; align-items:center; }
.logo-section img { height:40px; margin-right:10px; }
.logo-section span { font-size:20px; font-weight:bold; }

.hamburger { font-size:26px; cursor:pointer; user-select:none; }

/* 🔽 MENU */
.menu-dropdown {
  position:absolute;
  top:60px;
  right:20px;
  background:white;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
  display:none;
  flex-direction:column;
  min-width:200px;
  z-index:999;
}

.menu-dropdown button {
  padding:12px;
  border:none;
  background:white;
  text-align:left;
  cursor:pointer;
  font-weight:bold;
  border-bottom:1px solid #eee;
}

.menu-dropdown button:hover { background:#f2f2f2; }

/* 🔵 USER INFO */
.user-info {
  width:100%;
  background:#e0d4ff;
  display:flex;
  justify-content:flex-end;
  padding:5px 20px;
  font-size:14px;
  color:#333;
}

/* 🔵 TITULO */
.titulo-bar {
  width:95%;
  margin:20px auto;
  padding:10px;
  background:#512BD4;
  color:white;
  font-size:20px;
  font-weight:bold;
  border-radius:5px;
  text-align:center;
}

/* 🔘 BOTONES REPORTES */
.container {
  width:95%;
  max-width:900px;
  margin:20px auto;
}

.report-btn {
  display:flex;
  align-items:center;
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  cursor:pointer;
  border:1px solid #ddd;
  transition:0.2s;
}

.report-btn:hover { background:#eef2ff; }

.report-btn i {
  font-size:22px;
  margin-right:15px;
  color:#512BD4;
}

.report-text {
  font-size:16px;
  font-weight:bold;
}

/* 📱 RESPONSIVE */
@media(max-width:500px){
  .report-btn { padding:12px; }
  .report-text { font-size:14px; }
}
</style>
</head>

<body>

<!-- 🔵 BARRA -->
<div class="topbar">
  <div class="logo-section">
    <img src="lote.png">
    <span>Lottery</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <div id="menuDropdown" class="menu-dropdown">
    <button onclick="window.location.href='principal.html'">Principal</button>
    <button onclick="window.location.href='loterias.html'">Loterías</button>
    <button onclick="window.location.href='bancas.html'">Bancas</button>
    <button onclick="window.location.href='tickets.html'">Tickets</button>
    <button onclick="window.location.href='cambioclave.html'">Cambio Clave</button>
    <button onclick="cerrarSesion()">Cerrar Sesión</button>
  </div>
</div>

<!-- 🔵 USUARIO -->
<div class="user-info" id="userInfo">Usuario: -- | Fecha/Hora: --</div>

<!-- 🔵 TITULO -->
<div class="titulo-bar">Módulo de Reportes</div>

<!-- 🔘 BOTONES -->
<div class="container">

  <div class="report-btn" onclick="location.href='reporteventas.html'">
    <i class="fas fa-chart-line"></i>
    <div class="report-text">Reporte de Ventas</div>
  </div>

  <div class="report-btn" onclick="location.href='listajugada.html'">
    <i class="fas fa-list"></i>
    <div class="report-text">Lista de Jugada</div>
  </div>

  <div class="report-btn" onclick="location.href='reportegeneral.html'">
    <i class="fas fa-chart-pie"></i>
    <div class="report-text">Reporte General</div>
  </div>

  <div class="report-btn" onclick="location.href='reporteticket.html'">
    <i class="fas fa-receipt"></i>
    <div class="report-text">Reporte Por Ticket</div>
  </div>

  <div class="report-btn" onclick="location.href='ticket-pagado.html'">
    <i class="fas fa-check-circle"></i>
    <div class="report-text">Reporte Ticket Pagado</div>
  </div>

  <div class="report-btn" onclick="location.href='principal.html'">
    <i class="fas fa-home"></i> <!-- Icono de inicio -->
    <div class="report-text">Ir a Página Principal</div>
</div>

</div>

<script>
/* 🔥 USUARIO */
const usuarioGuardado = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = usuarioGuardado ? usuarioGuardado.nombre : "Invitado";

/* 🔥 MENU */
function toggleMenu(){
  const menu = document.getElementById("menuDropdown");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* 🔥 CERRAR SESION */
function cerrarSesion(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada");
  window.location.href = "index.html";
}

/* 🔥 INFO USUARIO */
function actualizarUserInfo(){
  const now = new Date();
  document.getElementById("userInfo").innerHTML =
    `Usuario: ${usuarioLogueado} | Fecha/Hora: ${now.toLocaleString()}`;
}

//contro de cerrar solo 
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  window.location.href = "login.html";
}

["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

setInterval(actualizarUserInfo,1000);
actualizarUserInfo();
</script>

</body>
</html>
