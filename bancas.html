<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LOTTERY SYSTEMS - Bancas</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
  .topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px 20px; position:relative; }
  .logo-section { display:flex; align-items:center; }
  .logo-section img { height:40px; margin-right:10px; }
  .hamburger { font-size:26px; cursor:pointer; }
  .menu-dropdown { position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2); display:none; flex-direction:column; min-width:200px; z-index:999; }
  .menu-dropdown button { padding:12px; border:none; background:white; text-align:left; cursor:pointer; font-weight:bold; border-bottom:1px solid #eee; }
  .user-info { width:100%; background:#e0d4ff; display:flex; justify-content:flex-end; padding:5px 20px; font-size:14px; }
  .titulo-bar { width:95%; margin:20px auto; padding:10px; background:#512BD4; color:white; border-radius:5px; text-align:center; font-size:21px;font-weight:bold; }
  
  .form-container { width:95%; max-width:800px; margin:20px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
  .form-container select, .form-container input { width:100%; padding:10px; margin-top:10px; border:1px solid #ccc; border-radius:5px; box-sizing: border-box; }
  .form-container button { width:100%; padding:10px; margin-top:10px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; color:white; }
  
  #btnGuardar { background:#28a745; }
  #btnBuscar { background:#512BD4; margin-top: 5px; }
  
  .tabla-container { width:95%; margin:20px auto; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; background:white; }
  th, td { border:1px solid #ccc; padding:10px; text-align:left; }
  th { background:#512BD4; color:white; }
  .resaltado { background:orange !important; }

  .columnas {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.col {
  flex: 1;
  min-width: 250px;
  background: #f5f5ff;
  padding: 15px;
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-section"><img src="lote.png">
  <span style="font-size:20px; font-weight:bold;" >Lottery</span></div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
  <div id="menuDropdown" class="menu-dropdown">
    <button onclick="window.location.href='principal.html'">Principal</button>
    <button onclick="window.location.href='loterias.html'">Loterías</button>
    <button onclick="window.location.href='bancas.html'">Bancas</button>
    <button onclick="window.location.href='tickets.html'">Tickets</button>
    <button onclick="window.location.href='cambioclave.html'">Usuarios</button>
    <button onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">Cerrar Sesión</button>
  </div>
</div>

<div class="user-info" id="userInfo">Cargando...</div>
<div class="titulo-bar">Gestión de Bancas y Alias</div>

<div class="form-container columnas">

  <!-- COLUMNA IZQUIERDA (ACTUALIZAR) -->
  <div class="col">
    <h2>Editar Alias y Perfil</h2>
    <select id="comboUsuarios" onchange="seleccionarUsuario()"></select>
    <input type="text" id="editAlias" placeholder="Escribir Alias">
    <input type="text" id="editDesc" placeholder="Escribir Descripción">
    <button id="btnGuardar">Guardar Cambios</button>
  </div>

  <!-- COLUMNA DERECHA (BUSCAR) -->
  <div class="col">
    <h2>Buscar Usuario</h2>
    <input type="text" id="buscarId" placeholder="Buscar por NombreUsuario">
    <button id="btnBuscar">Buscar en Tabla</button>
  </div>

</div>

<div class="tabla-container">
  <table id="tablaBancas">
    <thead>
      <tr>
        <th>No.</th>
        <th>NombreUsuario</th>
        <th>Alias</th>
        <th>Descripcion</th>
        <th>Grupo</th>
        <th>Estatus</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

const usuarioGuardado = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = usuarioGuardado ? usuarioGuardado.nombre : "Invitado";
const tipoUsuarioLogueado = usuarioGuardado ? usuarioGuardado.tipo : "";

let globalUsuarios = {};

window.toggleMenu = () => {
  const menu = document.getElementById("menuDropdown");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
};

/* CARGAR DATOS Y RELLENAR TODO */
async function cargarTodo() {
  onValue(ref(db, "Usuarios"), (snap) => {
    globalUsuarios = snap.val() || {};
    const tbody = document.querySelector("#tablaBancas tbody");
    const combo = document.getElementById("comboUsuarios");
    
    tbody.innerHTML = "";
    combo.innerHTML = "<option value=''>Seleccione un usuario...</option>";
    
    let contador = 1;
    for(const uid in globalUsuarios) {
      const u = globalUsuarios[uid];

      // VALIDACIÓN DE PRIVACIDAD
      if(tipoUsuarioLogueado === "Administrador" || u.Asignado === usuarioLogueado || u.NombreUsuario === usuarioLogueado) {
        
        // Llenar Combo
        const opt = new Option(u.NombreUsuario, uid);
        combo.add(opt);

        // Llenar Tabla
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${contador}</td>
          <td>${u.NombreUsuario}</td>
          <td>${u.Alias || "---"}</td>
          <td>${u.Descripcion || "---"}</td>
          <td>${u.Grupo || usuarioLogueado}</td>
          <td><input type="checkbox" disabled ${u.Activo ? "checked" : ""}></td>
        `;
        tbody.appendChild(fila);
        contador++;
      }
    }
  });
}

/* AL SELECCIONAR EN COMBO */
window.seleccionarUsuario = () => {
  const uid = document.getElementById("comboUsuarios").value;
  if(globalUsuarios[uid]) {
    document.getElementById("editAlias").value = globalUsuarios[uid].Alias || "";
    document.getElementById("editDesc").value = globalUsuarios[uid].Descripcion || "";
  }
};

/* GUARDAR ALIAS */
document.getElementById("btnGuardar").onclick = async () => {
  const uid = document.getElementById("comboUsuarios").value;
  const nuevoAlias = document.getElementById("editAlias").value.trim();
  const nuevaDesc = document.getElementById("editDesc").value.trim();

  if(!uid) return alert("Seleccione un usuario");

  try {
    await update(ref(db, `Usuarios/${uid}`), {
      Alias: nuevoAlias,
      Descripcion: nuevaDesc
    });
    alert("Datos actualizados");

      document.getElementById("comboUsuarios").value = "";
    document.getElementById("editAlias").value = "";
    document.getElementById("editDesc").value = "";
  } catch(e) {
    alert("Error: " + e.message);
  }
};

/* BUSCAR EN TABLA */
document.getElementById("btnBuscar").onclick = () => {
  const valor = document.getElementById("buscarId").value.trim().toLowerCase();
  document.querySelectorAll("#tablaBancas tbody tr").forEach(fila => {
    fila.classList.toggle("resaltado", fila.children[1].textContent.toLowerCase().includes(valor) && valor !== "");
  });
};

window.onload = () => {
  cargarTodo();
  setInterval(() => {
    const now = new Date();
    document.getElementById("userInfo").innerHTML = `Usuario: ${usuarioLogueado} | ${now.toLocaleString()}`;
  }, 1000);
};
</script>
</body>
</html>
