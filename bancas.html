<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LOTTERY SYSTEMS - Bancas</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }

  .topbar { 
    background:#512BD4; 
    color:white; 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
    padding:10px 20px; 
    position:relative;
  }

  .logo-section { display:flex; align-items:center; }
  .logo-section img { height:40px; margin-right:10px; }
  .logo-section span { font-size:20px; font-weight:bold; }

  .hamburger { font-size:26px; cursor:pointer; user-select:none; }
  .menu-dropdown {
    position:absolute;
    top:60px;
    right:20px;
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    display:none;
    flex-direction:column;
    min-width:200px;
    z-index:999;
  }
  .menu-dropdown button {
    padding:12px; border:none; background:white; text-align:left;
    cursor:pointer; font-weight:bold; border-bottom:1px solid #eee;
  }
  .menu-dropdown button:hover { background:#f2f2f2; }

  .user-info { 
    width:100%; 
    background:#e0d4ff; 
    display:flex; 
    justify-content:flex-end; 
    padding:5px 20px; 
    font-size:14px; 
    color:#333; 
  }

  .titulo-bar { 
    width:95%; margin:20px auto; padding:10px; 
    background:#512BD4; color:white; font-size:20px; font-weight:bold; 
    border-radius:5px; text-align:center;
  }

  .form-container {
    width:95%; max-width:600px; margin:20px auto;
    background:white; padding:20px; border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
  }

  .form-container input { 
    width:70%; padding:10px; margin-right:5px; margin-top:10px;
    border:1px solid #ccc; border-radius:5px; font-size:14px;
  }

  .form-container button { 
    padding:10px 15px; font-size:14px; font-weight:bold; border:none; 
    border-radius:5px; cursor:pointer; color:white; 
  }
  #btnBuscar { background:#28a745; }
  #btnRegresar { background:#6c757d; margin-top:10px; }

  .tabla-container { 
    width:95%; margin:20px auto; overflow-x:auto; 
  }

  table { width:100%; border-collapse:collapse; }
  th, td { border:1px solid #ccc; padding:10px; text-align:left; }
  th { background:#512BD4; color:white; position:sticky; top:0; }

  .resaltado { background:orange; }

  @media(max-width:500px){
    .form-container input { width:100%; margin-bottom:10px; }
    .form-container button { width:100%; margin-bottom:10px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-section">
    <img src="lote.png" alt="Logo">
    <span>Lottery</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <div id="menuDropdown" class="menu-dropdown">
    <button onclick="window.location.href='principal.html'">Principal</button>
    <button onclick="window.location.href='loterias.html'">Loterías</button>
    <button onclick="window.location.href='bancas.html'">Bancas</button>
    <button onclick="window.location.href='tickets.html'">Tickets</button>
    <button onclick="window.location.href='cambioclave.html'">Usuario</button>
    <button onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">Cerrar Sesión</button>
  </div>
</div>

<div class="user-info" id="userInfo">Usuario: -- | Fecha/Hora: --</div>
<div class="titulo-bar">Bancas</div>

<div class="form-container">
  <input type="text" id="buscarId" placeholder="Buscar por NombreUsuario">
  <button type="button" id="btnBuscar">Buscar</button>
  <button type="button" id="btnRegresar" onclick="window.location.href='principal.html'">Regresar</button>
</div>

<div class="tabla-container">
  <table id="tablaBancas">
    <thead>
      <tr>
        <th>No.</th>
        <th>NombreUsuario</th>
        <th>Descripcion</th>
        <th>Grupo</th>
        <th>Estatus</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey: "TU_API_KEY",
  databaseURL: "https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

//control de cerrar solo 
let tiempoInactivo;
const LIMITE = 10 * 60 * 1000;

function resetTimer(){
  clearTimeout(tiempoInactivo);
  tiempoInactivo = setTimeout(cerrarSesionAuto, LIMITE);
}

function cerrarSesionAuto(){
  localStorage.removeItem("usuarioLogueado");
  alert("Sesión cerrada por inactividad");
  window.location.href = "login.html";
}

["click","mousemove","keypress","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});
resetTimer();

/* 🔥 USUARIO */
const usuarioGuardado = JSON.parse(localStorage.getItem("usuarioLogueado"));
const usuarioLogueado = usuarioGuardado ? usuarioGuardado.nombre : "Invitado";
const tipoUsuarioLogueado = usuarioGuardado ? usuarioGuardado.tipo : ""; // Administrador o normal

/* 🔥 MENU */
window.toggleMenu = () => {
  const menu = document.getElementById("menuDropdown");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
};
window.cerrarSesion = () => { 
  alert("Sesión cerrada"); 
  window.location.href = "index.html"; 
};

/* 🔥 INFO */
function actualizarUserInfo(){
  const now = new Date();
  document.getElementById("userInfo").innerHTML =
    `Usuario: ${usuarioLogueado} | Fecha/Hora: ${now.toLocaleString()}`;
}

/* 🔥 CARGAR TABLA */
async function cargarBancas(){
  const tbody = document.querySelector("#tablaBancas tbody");
  tbody.innerHTML = "<tr><td colspan='5'>Cargando...</td></tr>";

  try{
    const usuariosSnap = await get(child(ref(db), "Usuarios"));
    const usuariosData = usuariosSnap.val() || {};

    tbody.innerHTML = "";
    let contador = 1;
    for(const uid in usuariosData){
      const usuario = usuariosData[uid];

      // 🔹 Si es Administrador, mostrar todos; si no, solo los asignados o el propio usuario
      if(tipoUsuarioLogueado === "Administrador" || 
         usuario.Asignado === usuarioLogueado || 
         usuario.NombreUsuario === usuarioLogueado) {

        const fila = document.createElement("tr");
        fila.dataset.uid = uid;
        fila.innerHTML = `
          <td>${contador}</td>
          <td>${usuario.NombreUsuario}</td>
          <td>${usuario.Descripcion}</td>
          <td>${usuario.Grupo || usuarioLogueado}</td>
          <td><input type="checkbox" disabled ${usuario.Activo ? "checked" : ""}></td>
        `;
        tbody.appendChild(fila);
        contador++;
      }
    }

    if(tbody.innerHTML === "") {
      tbody.innerHTML = "<tr><td colspan='5'>No hay usuarios para mostrar</td></tr>";
    }
  }catch(e){
    alert("Error cargando usuarios: "+e.message);
  }
}

/* 🔥 BUSCAR Y RESALTAR */
function buscarUsuario(){
  const valor = document.getElementById("buscarId").value.trim().toLowerCase();

  if(!valor){
    alert("Debe escribir un nombre");
    return;
  }

  let encontrado = false;

  document.querySelectorAll("#tablaBancas tbody tr").forEach(fila => {
    fila.classList.remove("resaltado");

    const nombre = (fila.children[1]?.textContent || "")
      .trim()
      .toLowerCase();

    if(nombre.includes(valor)){
      fila.classList.add("resaltado");
      encontrado = true;
    }
  });

  if(!encontrado){
    alert("Usuario no encontrado");
  }
}

window.addEventListener("DOMContentLoaded", () => {
  actualizarUserInfo();
  setInterval(actualizarUserInfo,1000);
  cargarBancas();
  document.getElementById("btnBuscar").addEventListener("click", buscarUsuario);
});
</script>

</body>
</html>
