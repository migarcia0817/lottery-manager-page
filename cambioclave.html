<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LOTTERY SYSTEMS - Cambios y Bloqueo</title>
<script src="seguridad.js"></script>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
.topbar { background:#512BD4; color:white; display:flex; justify-content:space-between; padding:10px 20px; }
.logo-section { display:flex; align-items:center; }
.logo-section img { height:40px; margin-right:10px; }
.hamburger { font-size:26px; cursor:pointer; }
.menu-dropdown { position: absolute; top: 60px; right: 20px; background: white; display: none; flex-direction: column; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); border-radius: 4px; z-index: 1000; padding: 10px 0; }
.menu-dropdown a { padding: 6px 12px; text-decoration: none; color: #333; font-size: 14px; font-weight:bold; display: block; }
.menu-dropdown a:hover { background: #f1f1f1; color: #512BD4; }
.menu-dropdown.show { display: flex; }
.user-info { background:#e0d4ff; padding:5px 20px; text-align:right; }
.titulo-bar { width:95%; margin:20px auto; padding:10px; background:#512BD4; color:white; text-align:center; }
.form-container{ max-width:1200px; margin:30px auto; display:flex; gap:20px; flex-wrap: wrap; }
.bloque{ background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
.grande{ flex: 2; }
select, input, button { width:100%; padding:10px; margin-top:10px; border-radius:5px; border: 1px solid #ccc; box-sizing: border-box; }
button { background:#512BD4; color:white; border:none; cursor:pointer; font-weight: bold; }
ul{ list-style:none; padding:0; margin:10px 0; display:flex; flex-wrap:wrap; gap:10px; }
li{ width:32%; display:flex; justify-content:space-between; align-items:center; background:#f2f2f2; padding:6px 10px; border-radius:5px; }
li button{ width:22px; height:22px; border-radius:50%; background:red; color:white; border:none; padding:0; line-height: 0; }
table{ width:95%; margin:20px auto; background:white; border-collapse:collapse; }
td,th{ border:1px solid #ccc; padding:8px; text-align: center; }
th{ background: #512BD4; color: white; }
.btn-borrar { background: #dc3545; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-section"><img src="lote.png"><span style="font-size:18px; font-weight: bold;">Lottery</span></div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
  <div id="menuDropdown" class="menu-dropdown">
    <a href="principal.html">Principal</a>
    <a href="loterias.html">Loterías</a>
    <a href="bancas.html">Banca</a>
    <a href="tickets.html">Ticket</a>
    <a href="cambioclave.html">Usuarios</a>
    <a href="javascript:void(0)" onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='index.html';">Cerrar Sesión</a>
  </div>
</div>

<div class="user-info" id="userInfo"></div>
<div class="titulo-bar">Gestión de Usuarios</div> 

<button id="btnRegistro" style="display:none; background:orangered; width:96.5%; margin:23px;" onclick="location.href='registrousuario.html'">
  ➕ Registrar Usuario
</button>

<div class="form-container">
  <div class="bloque">
    <h3>Clave</h3>
    <select id="usuariosClave"></select>
    <input id="nuevaClave" type="password" placeholder="Nueva Clave">
    <button style="background:#30A72A;" onclick="guardarClave()">Guardar</button>
  </div>

  <div class="bloque">
    <h3>Bloqueo</h3>
    <select id="usuariosBloqueo"></select>
    <button style="background:#F27257;" onclick="bloquearUsuario()">Bloquear/Desbloquear</button>

  </div>

  <div class="bloque grande">
    <h3>Crear Grupo</h3>
    <select id="usuariosGrupo"></select>
    <button style="background:#30A72A;" onclick="agregarUsuarioGrupo()">Agregar</button>
    <p>Supervisor</p>
    <select id="supervisorGrupo"></select>
    <ul id="listaGrupo"></ul>
    <button style="background:#30A72A;" onclick="guardarGrupo()">Crear Grupo</button>
  </div>
</div>

<table>
  <thead><tr><th>Grupo</th><th>Supervisor</th><th>Usuarios</th><th>Acciones</th></tr></thead>
  <tbody id="tabla"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, get, child, update, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const app = initializeApp({
  apiKey:"TU_API_KEY",
  databaseURL:"https://bancachupon-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

let data = {};
let lista = [];

// 🔥 USUARIO LOGUEADO
const user = JSON.parse(localStorage.getItem("usuarioLogueado"));
const tipo = user?.tipo?.toLowerCase();

// 🔐 BLOQUEO SI NO HAY LOGIN
if(!user){
  window.location.replace("index.html");
}

// MENU
window.toggleMenu = () => document.getElementById("menuDropdown").classList.toggle("show");

// INFO USUARIO
setInterval(() => {
  document.getElementById("userInfo").innerHTML = `${user.nombre} - ${new Date().toLocaleString()}`;
}, 1000);

// =====================
// CARGAR USUARIOS
// =====================
async function cargarUsuarios() {
  const snap = await get(child(ref(db), "Usuarios"));
  data = snap.val() || {};

  const combos = ["usuariosClave", "usuariosBloqueo", "usuariosGrupo"];
  combos.forEach(id => document.getElementById(id).innerHTML = "");
  document.getElementById("supervisorGrupo").innerHTML = "";

  for (const key in data) {
    const u = data[key];
    const idReal = u.Id;
    const texto = `${u.NombreUsuario} ${u.Activo ? '' : '(BLOQUEADO)'}`;

    // 🔥 FILTRO USUARIOS
    if (tipo === "administrador" || u.Asignado === user.nombre) {
      combos.forEach(id => {
        document.getElementById(id).add(new Option(texto, idReal));
      });
    }

    // 🔥 FILTRO SUPERVISORES
    if (u.TipoUsuario === "Supervisor" || u.tipo === "Supervisor") {
      if (tipo === "administrador" || u.Asignado === user.nombre) {
        document.getElementById("supervisorGrupo").add(
          new Option(u.NombreUsuario, u.NombreUsuario)
        );
      }
    }
  }

  document.getElementById("usuariosGrupo").add(new Option("🔥 TODOS", "TODOS"));
}

// =====================
// GUARDAR CLAVE
// =====================
window.guardarClave = async () => {
  const id = document.getElementById("usuariosClave").value;
  const clave = document.getElementById("nuevaClave").value.trim();
  if (!clave) return alert("Escriba la nueva clave");

  const key = Object.keys(data).find(k => String(data[k].Id) === String(id));

  if (key && confirm("¿Cambiar clave?")) {
    await update(ref(db, `Usuarios/${key}`), { Clave: clave });
    alert("Clave actualizada");
    document.getElementById("nuevaClave").value = "";
  }
};

// =====================
// BLOQUEAR
// =====================
window.bloquearUsuario = async () => {
  const id = document.getElementById("usuariosBloqueo").value;
  const key = Object.keys(data).find(k => String(data[k].Id) === String(id));

  if (key) {
    const nuevoEstado = !data[key].Activo;

    if (confirm(`¿Desea ${nuevoEstado ? 'ACTIVAR' : 'BLOQUEAR'} al usuario?`)) {
      await update(ref(db, `Usuarios/${key}`), { Activo: nuevoEstado });
      alert("Estado actualizado");
      cargarUsuarios();
    }
  }
};

//const user = JSON.parse(localStorage.getItem("usuarioLogueado"));

if(user && user.nombre.toLowerCase() === "m123"){
  document.getElementById("btnRegistro").style.display = "block";
}

// =====================
// AGREGAR USUARIOS A GRUPO
// =====================
window.agregarUsuarioGrupo = () => {
  const id = document.getElementById("usuariosGrupo").value;

  if (id === "TODOS") {
    lista = Object.values(data)
      .filter(u => tipo === "administrador" || u.Asignado === user.nombre)
      .map(u => String(u.Id));
  } else if (!lista.includes(String(id))) {
    lista.push(String(id));
  }

  render();
};

// =====================
// QUITAR USUARIO
// =====================
window.quitarUsuario = (id) => {
  lista = lista.filter(x => String(x) !== String(id));
  render();
};

// =====================
// RENDER LISTA
// =====================
function render() {
  const listaHtml = document.getElementById("listaGrupo");
  listaHtml.innerHTML = "";

  lista.forEach(id => {
    const u = Object.values(data).find(x => String(x.Id) === String(id));
    const li = document.createElement("li");

    li.innerHTML = `
      <span>${u?.NombreUsuario || id}</span>
      <button onclick="quitarUsuario('${id}')">×</button>
    `;

    listaHtml.appendChild(li);
  });
}

// =====================
// GUARDAR GRUPO
// =====================
window.guardarGrupo = async () => {
  const sup = document.getElementById("supervisorGrupo");

  const supNom = sup.options[sup.selectedIndex]?.text;

  if (lista.length === 0) return alert("Agregue usuarios");

  const nuevoGrupo = {
    supervisor: supNom,
    usuarios: lista,
    nombreGrupo: "Grupo_" + Date.now()
  };

  await push(ref(db, "Grupos"), nuevoGrupo);

  alert("Grupo creado con éxito");

  lista = [];
  render();
};

// =====================
// TABLA DE GRUPOS (FILTRADA)
// =====================
function cargarTablaGrupos() {
  const gruposRef = ref(db, "Grupos");

  onValue(gruposRef, (snapshot) => {
    const gruposData = snapshot.val();
    const tbody = document.getElementById("tabla");

    tbody.innerHTML = "";

    if (gruposData) {
      for (const key in gruposData) {
        const g = gruposData[key];

        // 🔥 FILTRO POR ROL
        if (tipo !== "administrador" && g.supervisor !== user.nombre) {
          continue;
        }

        const nombresUsuarios = g.usuarios.map(id => {
          const u = Object.values(data).find(user => String(user.Id) === String(id));
          return u ? u.NombreUsuario : id;
        }).join(", ");

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${g.nombreGrupo || key}</td>
          <td>${g.supervisor}</td>
          <td style="font-size:12px">${nombresUsuarios}</td>
          <td><button class="btn-borrar" onclick="eliminarGrupo('${key}')">Eliminar</button></td>
        `;

        tbody.appendChild(tr);
      }
    } else {
      tbody.innerHTML = "<tr><td colspan='4'>No hay grupos registrados</td></tr>";
    }
  });
}

// =====================
// ELIMINAR GRUPO
// =====================
window.eliminarGrupo = async (key) => {
  if(confirm("¿Eliminar este grupo?")) {
    await remove(ref(db, `Grupos/${key}`));
  }
};

// INIT
cargarUsuarios().then(() => {
  cargarTablaGrupos();
});
</script>
</body>
</html>
